<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黑燭地牢 | RPG</title>
  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    :root {
      --bg: #090807;
      --panel: #15120f;
      --panel-2: #201913;
      --line: #3a2c21;
      --text: #efe6d3;
      --muted: #a89780;
      --bone: #d8ccb8;
      --moss: #6f8760;
      --steel: #7e91a0;
      --gold: #d6a84f;
      --rust: #9f4f2e;
      --blood: #8f1d1d;
      --poison: #5f8f3a;
      --shadow: rgba(0, 0, 0, 0.55);
      --focus: #9eb3c2;
    }

    * {
      box-sizing: border-box;
    }

    ::selection {
      background: rgba(126, 145, 160, 0.42);
      color: #fff8e8;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(159, 79, 46, 0.18), transparent 30%),
        radial-gradient(circle at 80% 12%, rgba(111, 135, 96, 0.1), transparent 28%),
        linear-gradient(135deg, #050403 0%, var(--bg) 50%, #120d0a 100%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: linear-gradient(180deg, var(--panel-2), #120f0d);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      padding: 10px 14px;
      transition: border-color 160ms ease, color 160ms ease, transform 160ms ease;
      min-height: 44px;
      overflow-wrap: anywhere;
      text-align: center;
    }

    button:hover {
      border-color: var(--gold);
      color: var(--gold);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
    }

    button:focus-visible,
    a:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
      border-color: var(--steel);
      box-shadow: 0 0 0 4px rgba(126, 145, 160, 0.18);
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 0;
      line-height: 1.08;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      max-width: 32rem;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .black-candle-sigil {
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      color: var(--bone);
      filter: drop-shadow(0 0 10px rgba(214, 168, 79, 0.22));
    }

    .quick-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 560px;
      min-width: min(100%, 280px);
    }

    .topbar-tools {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      min-width: min(100%, 320px);
    }

    .language-control {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .language-control select {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(21, 18, 15, 0.94);
      color: var(--text);
      font: inherit;
      padding: 6px 34px 6px 10px;
      cursor: pointer;
    }

    .audio-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      max-width: 560px;
      min-width: 0;
    }

    .audio-toggle {
      display: grid;
      place-items: center;
      width: 44px;
      min-width: 44px;
      padding: 0;
      border-radius: 6px;
      line-height: 1;
    }

    .audio-toggle svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
    }

    .audio-slider {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      min-width: 154px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(21, 18, 15, 0.86);
      color: var(--muted);
      padding: 6px 9px;
      font-size: 13px;
      white-space: nowrap;
    }

    .audio-slider input {
      width: 92px;
      accent-color: var(--gold);
      cursor: pointer;
    }

    .stat {
      flex: 1 1 96px;
      min-width: 96px;
      max-width: 124px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(21, 18, 15, 0.86);
      box-shadow: 0 10px 30px var(--shadow);
      padding: 8px 10px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .stat strong {
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .nav button {
      flex: 0 1 auto;
      min-width: 118px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel,
    .log-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(32, 25, 19, 0.96), rgba(14, 12, 10, 0.98));
      box-shadow: 0 18px 45px var(--shadow);
      padding: 18px;
    }

    .panel {
      min-height: 420px;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, rgba(216, 204, 184, 0.045), transparent 38%),
        radial-gradient(circle at 18px 18px, rgba(126, 145, 160, 0.08) 0 1px, transparent 1.5px);
      background-size: auto, 28px 28px;
      opacity: 0.7;
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .panel h2,
    .log-panel h2 {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 22px;
      letter-spacing: 0;
      line-height: 1.25;
    }

    .panel h3,
    .log-panel h3 {
      line-height: 1.3;
    }

    .panel p,
    .log-panel p {
      max-width: 68ch;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .actions button {
      flex: 0 1 auto;
      min-width: 112px;
    }

    .muted {
      color: var(--muted);
    }

    .guide {
      border-left: 3px solid var(--moss);
      background: rgba(111, 135, 96, 0.1);
      color: var(--text);
      padding: 12px 14px;
      margin: 12px 0;
    }

    .log-list {
      display: grid;
      gap: 10px;
      margin: 0;
    }

    .log-list p {
      margin: 0;
      border-bottom: 1px solid rgba(58, 44, 33, 0.7);
      color: var(--muted);
      padding-bottom: 10px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .info-grid div {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(21, 18, 15, 0.72);
      padding: 10px 12px;
      min-width: 0;
    }

    .shop-card {
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr) minmax(112px, auto);
      gap: 16px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 18, 15, 0.72);
      margin-top: 16px;
      padding: 16px;
      min-width: 0;
    }

    .shop-card h3 {
      margin: 0 0 6px;
      color: var(--gold);
      font-size: 18px;
    }

    .shop-card p {
      margin: 2px 0;
    }

    .shop-card .actions {
      margin-top: 0;
    }

    .item-icon {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 62px;
      height: 62px;
      border: 1px solid rgba(214, 168, 79, 0.42);
      border-radius: 8px;
      background: linear-gradient(150deg, rgba(214, 168, 79, 0.1), rgba(126, 145, 160, 0.08));
      font-size: 30px;
      line-height: 1;
      overflow: hidden;
    }

    .potion-art {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 5px;
      filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.55));
    }

    .scene-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 7;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        radial-gradient(circle at 70% 24%, rgba(159, 79, 46, 0.16), transparent 30%),
        linear-gradient(135deg, #15120f, #070605);
      isolation: isolate;
      margin: 12px 0 18px;
    }

    .scene-stage.compact {
      aspect-ratio: 16 / 5;
    }

    .scene-art {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .scene-stage::after {
      content: "";
      position: absolute;
      inset: 32% 0 0;
      z-index: 1;
      background: linear-gradient(transparent, rgba(5, 4, 3, 0.94));
      pointer-events: none;
    }

    .scene-caption {
      position: absolute;
      inset: auto 16px 14px;
      z-index: 3;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
      pointer-events: none;
    }

    .scene-copy {
      min-width: 0;
      max-width: min(58%, 38rem);
      text-shadow: 0 2px 12px #000, 0 1px 2px #000;
    }

    .scene-location,
    .scene-status {
      display: block;
      overflow-wrap: anywhere;
    }

    .scene-location {
      color: #fff4dc;
      font-size: clamp(17px, 2.4vw, 24px);
      font-weight: 700;
      line-height: 1.2;
    }

    .scene-status {
      margin-top: 3px;
      color: var(--bone);
      font-size: 13px;
    }

    .danger-marker {
      flex: 0 0 auto;
      border: 1px solid rgba(214, 168, 79, 0.72);
      border-radius: 4px;
      background: rgba(74, 14, 12, 0.86);
      color: #ffe4ad;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      padding: 7px 9px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
    }

    .monster-art {
      position: absolute;
      z-index: 2;
      right: 5%;
      bottom: 0;
      width: min(42%, 360px);
      height: 92%;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72));
      transform-origin: 50% 92%;
      animation: monster-idle 2.8s ease-in-out infinite;
      will-change: transform, filter, opacity;
    }

    .scene-stage.strong-enemy .monster-art {
      filter:
        drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72))
        drop-shadow(0 0 18px rgba(159, 79, 46, 0.72));
    }

    .scene-stage.monster-action-attack .monster-art {
      animation: monster-attack 520ms cubic-bezier(0.2, 0.9, 0.24, 1.05) both;
    }

    .scene-stage.monster-action-hurt .monster-art {
      animation: monster-hurt 360ms ease-out both;
    }

    .scene-stage.monster-action-death .monster-art {
      animation: monster-death 820ms cubic-bezier(0.13, 0.65, 0.22, 1) both;
    }

    .scene-stage.monster-action-attack::before,
    .scene-stage.monster-action-hurt::before,
    .scene-stage.monster-action-death::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
    }

    .scene-stage.monster-action-hurt::before,
    .scene-stage.monster-action-attack::before {
      background: radial-gradient(circle at 71% 45%, rgba(255, 228, 173, 0.32), transparent 18%);
      animation: impact-flash 360ms ease-out both;
    }

    .scene-stage.monster-action-death::before {
      background:
        radial-gradient(circle at 70% 50%, rgba(214, 168, 79, 0.22), transparent 20%),
        linear-gradient(90deg, transparent, rgba(7, 6, 5, 0.46));
      animation: death-haze 820ms ease-out both;
    }

    .scene-failed .scene-art,
    .monster-failed .monster-art,
    .potion-failed .potion-art {
      display: none;
    }

    img[hidden] {
      display: none !important;
    }

    @keyframes monster-idle {
      0%,
      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(0, -5px, 0) scale(1.015);
      }
    }

    @keyframes monster-attack {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      24% {
        transform: translate3d(7%, -2%, 0) scale(0.98, 1.04) rotate(-1deg);
      }

      56% {
        transform: translate3d(-14%, 2%, 0) scale(1.1, 0.96) rotate(2deg);
        filter: drop-shadow(0 20px 26px rgba(0, 0, 0, 0.74)) brightness(1.16);
      }

      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes monster-hurt {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72));
      }

      20% {
        transform: translate3d(5%, 0, 0) scale(1.04, 0.96) rotate(2deg);
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72)) brightness(1.6) saturate(1.25);
      }

      45% {
        transform: translate3d(-4%, 1%, 0) scale(0.97, 1.03) rotate(-2deg);
      }

      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes monster-death {
      0% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72)) brightness(1.2);
      }

      30% {
        opacity: 0.92;
        transform: translate3d(2%, -3%, 0) scale(1.06, 0.94) rotate(3deg);
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72)) grayscale(0.45) brightness(1.25);
      }

      72% {
        opacity: 0.45;
        transform: translate3d(9%, 13%, 0) scale(0.82, 0.72) rotate(9deg);
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.62)) grayscale(0.8) brightness(0.78);
      }

      100% {
        opacity: 0;
        transform: translate3d(14%, 24%, 0) scale(0.56, 0.42) rotate(13deg);
        filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.45)) grayscale(1) brightness(0.45);
      }
    }

    @keyframes impact-flash {
      0% {
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes death-haze {
      0% {
        opacity: 0;
      }

      35% {
        opacity: 0.82;
      }

      100% {
        opacity: 0;
      }
    }

    .combat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .combatant {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 18, 15, 0.72);
      padding: 14px;
      min-width: 0;
    }

    .combatant.danger {
      border-color: rgba(143, 29, 29, 0.82);
      background: rgba(44, 14, 12, 0.72);
    }

    .combatant h3 {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 18px;
    }

    .effect-list {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin: 8px 0 0;
    }

    .skill-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      margin-top: 14px;
    }

    .skill-card {
      align-items: stretch;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 18, 15, 0.62);
      display: grid;
      gap: 8px;
      min-width: 0;
      padding: 10px;
    }

    .skill-card button {
      width: 100%;
    }

    .skill-card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin: 0;
    }

    .event-card {
      border: 1px solid rgba(214, 162, 73, 0.45);
      border-radius: 8px;
      background: rgba(31, 24, 17, 0.76);
      display: grid;
      gap: 10px;
      margin-top: 16px;
      padding: 14px;
    }

    .event-card h3 {
      color: var(--gold);
      margin: 0;
    }

    .event-card p {
      color: var(--muted);
      margin: 0;
    }

    .event-options {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .relic-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      margin-top: 14px;
    }

    .relic-card {
      border: 1px solid rgba(214, 162, 73, 0.38);
      border-radius: 8px;
      background: rgba(21, 18, 15, 0.62);
      min-width: 0;
      padding: 12px;
    }

    .relic-card h3 {
      color: var(--gold);
      font-size: 16px;
      margin: 0 0 6px;
    }

    .relic-card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin: 0;
    }

    .relic-meta {
      display: grid;
      gap: 4px;
      margin-top: 8px;
    }

    .relic-tag {
      display: inline-flex;
      width: fit-content;
      border: 1px solid rgba(126, 145, 160, 0.5);
      border-radius: 999px;
      color: var(--bone);
      font-size: 12px;
      line-height: 1.2;
      padding: 3px 8px;
    }

    .relic-tag.active {
      border-color: rgba(214, 168, 79, 0.72);
      color: #ffe4ad;
    }

    .boss-callout {
      border-left-color: var(--gold);
      background: rgba(214, 168, 79, 0.12);
    }

    @media (max-width: 860px) {
      .event-options {
        grid-template-columns: 1fr;
      }
    }

    .meter {
      overflow: hidden;
      height: 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #080706;
      margin: 8px 0 10px;
      min-width: 0;
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--poison), #9fca62);
    }

    .meter.enemy span {
      background: linear-gradient(90deg, var(--blood), var(--rust));
    }

    .combat-log {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      max-height: 240px;
      overflow: auto;
    }

    .combat-log p {
      margin: 0;
      border-bottom: 1px solid rgba(58, 44, 33, 0.7);
      color: var(--muted);
      padding-bottom: 8px;
    }

    @media (max-width: 860px) {
      .app {
        width: min(100% - 20px, 680px);
        padding: 16px 0;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .quick-stats {
        justify-content: flex-start;
      }

      .topbar-tools,
      .audio-controls {
        align-items: stretch;
        justify-content: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .combat-grid {
        grid-template-columns: 1fr;
      }

      .skill-grid {
        grid-template-columns: 1fr;
      }

      .nav button,
      .actions button {
        flex: 1 1 140px;
        min-width: min(100%, 140px);
      }
    }

    @media (max-width: 620px) {
      .brand-row {
        gap: 10px;
      }

      .black-candle-sigil {
        width: 34px;
        height: 34px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .shop-card {
        grid-template-columns: 54px minmax(0, 1fr);
        gap: 12px;
        padding: 12px;
      }

      .item-icon {
        width: 54px;
        height: 54px;
      }

      .scene-stage,
      .scene-stage.compact {
        aspect-ratio: 4 / 3;
      }

      .monster-art {
        right: 16%;
        width: 68%;
        height: 84%;
      }

      .scene-caption {
        inset: auto 12px 10px;
        gap: 8px;
      }

      .scene-copy {
        max-width: 72%;
      }

      .scene-location {
        font-size: 18px;
      }

      .shop-card .actions {
        grid-column: 1 / -1;
      }

      .audio-slider {
        flex: 1 1 150px;
        min-width: min(100%, 150px);
      }

      .audio-slider input {
        flex: 1 1 auto;
        width: min(120px, 38vw);
      }
    }

    @media (max-width: 360px) {
      .app {
        width: calc(100% - 16px);
      }

      .brand h1 {

    function interpolate(template, params = {}) {
      return String(template).replace(/\{([^{}]+)\}/g, (match, key) => {
        const value = params[key.trim()];
        return value == null ? "" : String(value);
      });
    }

    function getTranslationValue(dictionary, key) {
      return key.split(".").reduce((value, part) => (
        value && Object.prototype.hasOwnProperty.call(value, part) ? value[part] : undefined
      ), dictionary);
    }

    function t(key, params = {}) {
      const activeDictionary = I18N[currentLanguage] || I18N[DEFAULT_LANGUAGE];
      const fallbackDictionary = I18N[DEFAULT_LANGUAGE];
      const template = getTranslationValue(activeDictionary, key) ?? getTranslationValue(fallbackDictionary, key) ?? key;
      return interpolate(template, params);

      return {
        saveVersion: SAVE_VERSION,
        savedAt: new Date().toISOString(),

        player: deepClone(state.player),

      if (!canSaveSafeState()) {
        return false;
      }

      if (!saveSessionReady && saveMetadata) {
        return false;
      }

      try {
        const payload = buildSavePayload();
        localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
        saveMetadata = { saveVersion: payload.saveVersion, savedAt: payload.savedAt };
        saveSessionReady = true;
        return true;
      } catch (error) {
        return false;
      }
    }

    function readSavePayload() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) {
          saveMetadata = null;
          saveSessionReady = true;
          return null;
        }

        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") {
          saveMetadata = null;
          saveSessionReady = true;
          return null;
        }

        const rawSaveVersion = safeNumber(parsed.saveVersion, 0, 0, Number.MAX_SAFE_INTEGER);
        saveMetadata = {
          saveVersion: rawSaveVersion,
          savedAt: typeof parsed.savedAt === "string" ? parsed.savedAt : ""
        };
        saveSessionReady = false;
        return parsed;
      } catch (error) {
        saveMetadata = null;
        saveSessionReady = true;
        return null;
      }
    }

    function replaceState(nextState) {
      Object.keys(state).forEach((key) => {
        delete state[key];
      });
      Object.assign(state, nextState);
    }

    function loadGame({ announce = true } = {}) {
      const payload = readSavePayload();
      if (!payload) {
        return false;
      }

      const payloadVersion = safeNumber(payload.saveVersion, 0, 0, Number.MAX_SAFE_INTEGER);
      if (payloadVersion > SAVE_VERSION) {
        if (announce) {
          addLog("logs.saveNewerVersion", { version: payloadVersion, currentVersion: SAVE_VERSION });
          render();
        }
        return false;
      }

      const defaults = createInitialState();
      const loadedState = {
        ...defaults,
        activeScreen: SCREENS[payload.activeScreen] && payload.activeScreen !== "combat" ? payload.activeScreen : "main",
        player: normalizeLoadedPlayer(payload.player),
        story: normalizeLoadedStory(payload.story),
        currentMonster: null,
        combatAnimation: null,
        combatResolution: null,
        logs: normalizeLogList(payload.logs, defaults.logs),
        combatLogs: []

      replaceState(loadedState);
      saveSessionReady = true;
      ensurePlayerCombatState();
      ensureStoryProgressState();

      if (announce) {
        addLog("logs.saveLoaded");
      }

      saveGame();
      render();
      return true;
    }
