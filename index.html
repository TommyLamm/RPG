        return true;
      }

      return loadGame({ announce: true });
    }

    function bossDefinitionForStage(stageIndex = currentStageIndex()) {
      return BOSS_DEFINITIONS.find((boss) => boss.stage === stageIndex) || null;
    }

    function hasDefeatedBoss(bossId) {
      ensureStoryProgressState();
      return state.story.defeatedBosses.includes(bossId);
    }

    function pendingBossDefinition() {
      ensureStoryProgressState();
      const boss = bossDefinitionForStage();
      const threshold = STAGE_PROGRESS_THRESHOLDS[currentStageIndex()] ?? Infinity;

      if (!boss || hasDefeatedBoss(boss.id) || state.story.progress < threshold) {
        return null;
      }

      return boss;
    }

    function bossNameParam(boss) {
      return translatedParam(boss.nameKey);
    }

    function bossDisplayName(boss) {
      return boss ? t(boss.nameKey) : t("common.unknownArea");
    }

    function adventureEventTitleParam(eventId) {
      return translatedParam(`events.${eventId}.title`);
    }

    function stageText(stageIndex, field) {
      const rawStage = Number(stageIndex);
      const safeStage = Number.isFinite(rawStage) ? Math.floor(rawStage) : 0;
      const stage = stages[clamp(safeStage, 0, stages.length - 1)] || stages[0];
      return t(`stages.${stage.id}.${field}`);
    }

    function currentStoryStatus() {
      if (state.story.expeditionComplete) {
        return t("adventure.expeditionCompleteStatus");
      }

      const candidateStatusKey = state.story.statusKey || legacyStoryStatusKeys[state.story.status] || currentStage().id;
      const statusKey = stages.some((stage) => stage.id === candidateStatusKey) ? candidateStatusKey : currentStage().id;
      return t(`stages.${statusKey}.status`);
    }

    function adventureGoalText() {
      ensureStoryProgressState();

      if (state.story.expeditionComplete) {
        return t("adventure.expeditionComplete");
      }

      const boss = pendingBossDefinition();
      if (boss) {
        return t("adventure.bossPending", { bossName: bossDisplayName(boss) });
      }

      const nextBoss = bossDefinitionForStage();
      const threshold = STAGE_PROGRESS_THRESHOLDS[currentStageIndex()] ?? 0;
      const remaining = Math.max(1, threshold - state.story.progress);
      return t("adventure.stageGoal", {
        count: remaining,
        bossName: bossDisplayName(nextBoss)
      });
    }

    function currentSceneAsset() {
      const stageIndex = clamp(currentStageIndex(), 0, sceneAssets.length - 1);
      return sceneAssets[stageIndex] || sceneAssets[0];
    }

    function normalizeMonsterId(monster) {
      if (monster && typeof monster === "object" && monster.monsterId) {
        const monsterId = String(monster.monsterId);
        return monsterIds.includes(monsterId) ? monsterId : "";
      }

      const rawName = monster && typeof monster === "object" ? monster.name : monster;
      const baseName = String(rawName || "")
        .replace(/^(强敌|強敵|Strong enemy|Enemy)\s*/i, "")
        .replace(/（(强敌|強敵)）$/, "")
        .replace(/\s*\((Strong enemy)\)$/i, "")
        .trim();
      return legacyMonsterNameIds[baseName] || "";
    }

    function monsterName(monster) {
      if (monster?.boss && monster.name) {
        return String(monster.name);
      }

      const monsterId = normalizeMonsterId(monster);
      if (monsterId) {
        return t(`monsters.${monsterId}`);
      }

      if (monster && typeof monster === "object" && monster.name) {
        return String(monster.name);
      }

      return String(monster || "");
    }

    function monsterAsset(monster) {
      const monsterId = normalizeMonsterId(monster);
      return monsterAssets[monsterId] || "";
    }

    function activeMonsterAction() {
      const action = state.combatAnimation?.action || "";
      return ["attack", "hurt", "death"].includes(action) ? action : "idle";
    }

    function monsterActionAsset(monster, action = "idle") {
      if (action === "idle") {
        return monsterAsset(monster);
      }

      const monsterId = normalizeMonsterId(monster);
      return monsterActionAssets[monsterId]?.[action] || monsterAsset(monster);
    }

    function handleAssetError(image) {
      image.hidden = true;
      const visual = image.closest("[data-visual]");

      if (image.classList.contains("scene-art")) {
        visual?.classList.add("scene-failed");
      } else if (image.classList.contains("monster-art")) {
        visual?.classList.add("monster-failed");
      } else if (image.classList.contains("potion-art")) {
        visual?.classList.add("potion-failed");
      }
    }

    function handleAssetLoad(image) {
      image.hidden = false;
    }

    function renderPotionImage(className = "potion-art") {
      return `<img class="${escapeHtml(className)}" src="${POTION_ASSET}" alt="${escapeHtml(t("shop.potionName"))}" decoding="async" hidden onload="handleAssetLoad(this)" onerror="handleAssetError(this)">`;
    }

    function renderSceneStage({ scene, location, status, monster = null, compact = false }) {
      const requestedScene = String(scene || "");
      const sceneSource = escapeHtml(knownSceneAssets.has(requestedScene) ? requestedScene : defaultSceneAsset);
      const locationLabel = escapeHtml(location || t("common.unknownArea"));
      const statusLabel = escapeHtml(status || "");
      const displayMonsterName = monster ? monsterName(monster) : "";
      const monsterAction = monster ? activeMonsterAction() : "idle";
      const monsterSource = monsterActionAsset(monster, monsterAction);
      const strongEnemy = Boolean(monster && monster.strong);
      const stageClasses = [
        "scene-stage",
        compact ? "compact" : "",
        strongEnemy ? "strong-enemy" : "",
        monster && monsterAction !== "idle" ? `monster-action-${monsterAction}` : ""
      ]
        .filter(Boolean)
        .join(" ");

      return `
        <div class="${stageClasses}" data-visual="scene-stage">
          <img class="scene-art" src="${sceneSource}" alt="" loading="eager" decoding="async" hidden onload="handleAssetLoad(this)" onerror="handleAssetError(this)">
          ${monster && monsterSource ? `<img class="monster-art" src="${escapeHtml(monsterSource)}" alt="${escapeHtml(displayMonsterName)}" data-monster-action="${escapeHtml(monsterAction)}" loading="eager" decoding="async" hidden onload="handleAssetLoad(this)" onerror="handleAssetError(this)">` : ""}
          <div class="scene-caption">
            <div class="scene-copy">
              <span class="scene-location">${locationLabel}</span>
              ${statusLabel ? `<span class="scene-status">${statusLabel}</span>` : ""}
            </div>
            ${strongEnemy ? `<span class="danger-marker">${escapeHtml(t("common.strongEnemy"))}</span>` : ""}
          </div>
        </div>
      `;
    }

    function sceneStage(options) {
      return renderSceneStage(options);
    }

    function addLog(key, params = {}) {
      state.logs.unshift(logEntry(key, params));
      state.logs = state.logs.slice(0, 10);
      logRevision += 1;
    }

    function addLiteralLog(message) {
      state.logs.unshift(literalLogEntry(message));
      state.logs = state.logs.slice(0, 10);
      logRevision += 1;
    }

    function addCombatLog(key, params = {}) {
      state.combatLogs.push(logEntry(key, params));
      state.combatLogs = state.combatLogs.slice(-10);
      combatLogRevision += 1;
    }

    function controlFocusKey(control) {
      const stableKey = control.getAttribute("data-focus-key");
      if (stableKey) {
        return `${control.tagName}|${stableKey}`;
      }

      const action = control.getAttribute("onclick") || control.getAttribute("oninput") || control.getAttribute("onchange") || "";
      const label = control.getAttribute("aria-label") || control.textContent.trim().replace(/\s+/g, " ");
      return `${control.tagName}|${control.type || ""}|${action}|${label}`;
    }

    function updateGameAnnouncer() {
      const latestLog = formatLogEntry(state.logs[0]);
      const latestCombatLog = formatLogEntry(state.combatLogs[state.combatLogs.length - 1]);
      const messages = [];

      if (logRevision !== lastAnnouncedLogRevision && latestLog) {
        messages.push(latestLog);
      }

      if (combatLogRevision !== lastAnnouncedCombatLogRevision && latestCombatLog) {
        messages.push(latestCombatLog);
      }

      lastAnnouncedLogRevision = logRevision;
      lastAnnouncedCombatLogRevision = combatLogRevision;

      if (messages.length) {
        const announcement = messages.join(" ");
        gameAnnouncer.textContent = "";
        queueMicrotask(() => {
          gameAnnouncer.textContent = announcement;
        });
      }
    }

    function hasActiveCombat() {
      return Boolean(state.currentMonster && state.currentMonster.hp > 0 && state.player.hp > 0);
    }

    function isCombatBusy() {
      return Boolean(state.combatAnimation || state.combatResolution);
    }

    function isCombatLocked() {
      return Boolean(state.currentMonster || state.combatResolution);
    }

    function ensurePlayerCombatState() {
      if (!Array.isArray(state.player.skills)) {
        state.player.skills = SKILL_DEFINITIONS.map((skill) => skill.id);
      }

      if (!state.player.effects || typeof state.player.effects !== "object") {
        state.player.effects = {};
      }

      if (!Array.isArray(state.player.relics)) {
        state.player.relics = [];
      }

      state.player.relics = [...new Set(state.player.relics.filter((relicId) => RELIC_IDS.has(relicId)))];

      if (!state.player.relicStates || typeof state.player.relicStates !== "object") {
        state.player.relicStates = {};
      }
    }

    function relicDefinition(relicId) {
      return RELIC_DEFINITIONS.find((relic) => relic.id === relicId) || null;
    }

    function hasRelic(relicId) {
      ensurePlayerCombatState();
      return state.player.relics.includes(relicId);
    }

    function relicNameParam(relicId) {
      const relic = relicDefinition(relicId);
      return translatedParam(relic ? relic.nameKey : "relics.empty");
    }

    function isLowHpDefenseRelicActive() {
      if (!hasRelic("ironrootBadge")) {
        return false;
      }

      const relic = relicDefinition("ironrootBadge");
      const threshold = Math.max(1, Math.floor(state.player.maxHp * relic.lowHpThreshold));
      return state.player.hp <= threshold;
    }

    function relicStatusLabel(relic) {
      if (relic.preventsFirstGoldLoss && state.player.relicStates?.burialCoinSpent) {
        return t("relics.used");
      }

      if (relic.lowHpDefenseBonus && isLowHpDefenseRelicActive()) {
        return t("relics.active");
      }

      if (relic.bossEntryHeal && Array.isArray(state.player.relicStates?.dawnflaskBosses) && state.player.relicStates.dawnflaskBosses.length) {
        return t("relics.used");
      }

      return "";
    }

    function grantRelic(relicId, logKey = "logs.relicFound") {
      ensurePlayerCombatState();
      const relic = relicDefinition(relicId);

      if (!relic || hasRelic(relic.id)) {
        return false;
      }

      state.player.relics.push(relic.id);
      audioController.playSfx("discovery");
      addLog(logKey, { relicName: relicNameParam(relic.id) });
      saveGame();
      return true;
    }

    function grantEventRelic(eventId) {
      const relic = RELIC_DEFINITIONS.find((item) => item.eventReward === eventId);
      return relic ? grantRelic(relic.id) : false;
    }

    function grantBossRelic(bossId) {
      const relic = RELIC_DEFINITIONS.find((item) => item.bossReward === bossId);
      return relic ? grantRelic(relic.id, "logs.relicBossReward") : false;
    }

    function applyExplorationGold(baseGold) {
      let gold = baseGold;

      if (hasRelic("scavengerMap")) {
        const relic = relicDefinition("scavengerMap");
        gold += relic.eventGoldBonus;
        addLog("logs.relicEventGold", {
          relicName: relicNameParam(relic.id),
          amount: relic.eventGoldBonus
        });
      }

      state.player.gold += gold;
      return gold;
    }

    function triggerBossEntryRelic(boss) {
      if (!boss || !hasRelic("dawnflask") || state.player.hp >= state.player.maxHp) {
        return;
      }

      const relic = relicDefinition("dawnflask");
      const usedBosses = Array.isArray(state.player.relicStates.dawnflaskBosses)
        ? state.player.relicStates.dawnflaskBosses
        : [];

      if (usedBosses.includes(boss.id)) {
        return;
      }

      const healed = Math.min(relic.bossEntryHeal, state.player.maxHp - state.player.hp);
      state.player.hp += healed;
      state.player.relicStates.dawnflaskBosses = [...usedBosses, boss.id];
      addCombatLog("combatLogs.relicBossEntryHeal", { relicName: relicNameParam(relic.id), amount: healed });
      addLog("logs.relicBossEntryHeal", { relicName: relicNameParam(relic.id), amount: healed });
    }

    function renderRelicList() {
      ensurePlayerCombatState();

      if (!state.player.relics.length) {
        return `<p class="muted">${escapeHtml(t("relics.empty"))}</p>`;
      }

      return `
        <div class="relic-grid">
          ${state.player.relics.map((relicId) => {
            const relic = relicDefinition(relicId);
            if (!relic) {
              return "";
            }

            const status = relicStatusLabel(relic);
            const source = relic.sourceKey ? t("relics.source", { source: t(relic.sourceKey) }) : "";

            return `
              <article class="relic-card">
                <h3>${escapeHtml(t(relic.nameKey))}${status ? ` <span class="muted">(${escapeHtml(status)})</span>` : ""}</h3>
                <p>${escapeHtml(t(relic.descriptionKey))}</p>
                <div class="relic-meta">
                  ${source ? `<span class="relic-tag">${escapeHtml(source)}</span>` : ""}
                  ${status ? `<span class="relic-tag ${status === t("relics.active") ? "active" : ""}">${escapeHtml(status)}</span>` : ""}
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function ensureMonsterCombatState(monster) {
      if (!monster || typeof monster !== "object") {
        return;
      }

      monster.boss = Boolean(monster.boss || monster.bossId || monster.source === "boss");

      if (!monster.ability) {
        monster.ability = normalizeMonsterId(monster) || "basic";
      }

      if (!monster.statusEffects || typeof monster.statusEffects !== "object" || Array.isArray(monster.statusEffects)) {
        monster.statusEffects = {};
      }

      if (!monster.abilityStatsApplied) {
        const ability = monsterAbilityId(monster);
        const config = MONSTER_ABILITIES[ability];

        if (ability === "slime") {
          monster.attack = Math.max(1, Math.floor(monster.attack * config.attackMultiplier));
        } else if (ability === "skeleton") {
          monster.defense += config.defenseBonus;
        }

        monster.ability = ability;
        monster.abilityStatsApplied = true;
      }
    }

    function clearCombatEffects() {
      ensurePlayerCombatState();
      state.player.effects = {};
    }

    function skillDefinition(skillId) {
      return SKILL_DEFINITIONS.find((skill) => skill.id === skillId) || SKILL_DEFINITIONS[0];
    }

    function skillName(skillId) {
      return t(skillDefinition(skillId).nameKey);
    }

    function availableSkillDefinitions() {
      ensurePlayerCombatState();
      const unlocked = new Set(state.player.skills);
      return SKILL_DEFINITIONS.filter((skill) => unlocked.has(skill.id));
    }

    function isSkillAvailable(skillId, monster = state.currentMonster) {
      ensurePlayerCombatState();
      ensureMonsterCombatState(monster);

      if (!monster || monster.hp <= 0 || state.player.hp <= 0 || isCombatBusy()) {
        return false;
      }

      if (skillId === "heavyStrike" && state.player.effects.heavyRecovering) {
        return false;
      }

      if (skillId === "burningCurse" && monster.statusEffects.burn) {
        return false;
      }

      return true;
    }

    function reducePlayerTurnEffects() {
      ensurePlayerCombatState();
      const heavyRecovering = state.player.effects.heavyRecovering;

      if (heavyRecovering) {
        heavyRecovering.turns -= 1;
        if (heavyRecovering.turns <= 0) {
          delete state.player.effects.heavyRecovering;
        }
      }
    }

    function applyMonsterStatusEffects(monster) {
      ensureMonsterCombatState(monster);

      if (!monster?.statusEffects?.burn || monster.hp <= 0) {
        return false;
      }

      const burn = monster.statusEffects.burn;
      const damage = Math.max(1, burn.damage || 1);
      monster.hp = Math.max(0, monster.hp - damage);
      addCombatLog("combatLogs.burnTick", { monsterName: monsterNameParam(monster), damage });
      burn.turns -= 1;

      if (burn.turns <= 0) {
        delete monster.statusEffects.burn;
      }

      return monster.hp <= 0;
    }

    function applyPlayerStatusEffects() {
      ensurePlayerCombatState();
      const curse = state.player.effects.blackCandleCurse;

      if (!curse || state.player.hp <= 0) {
        return false;
      }

      const damage = Math.max(1, Number(curse.damage) || 1);
      state.player.hp = Math.max(0, state.player.hp - damage);
      addCombatLog("combatLogs.cultistCurseTick", { damage });
      curse.turns -= 1;

      if (curse.turns <= 0) {
        delete state.player.effects.blackCandleCurse;
      }

      return state.player.hp <= 0;
    }

    function playerEffectLabels() {
      ensurePlayerCombatState();
      const labels = [];

      if (state.player.effects.guarded) {
        labels.push(t("effects.guarded"));
      }

      if (state.player.effects.heavyRecovering) {
        labels.push(t("effects.heavyRecovering"));
      }

      if (state.player.effects.blackCandleCurse) {
        const curse = state.player.effects.blackCandleCurse;
        labels.push(t("effects.blackCandleCurse", {
          turns: curse.turns,
          defensePenalty: curse.defensePenalty
        }));
      }

      if (isLowHpDefenseRelicActive()) {
        labels.push(t("effects.lowHpDefense", {
          relicName: relicNameParam("ironrootBadge"),
          amount: relicDefinition("ironrootBadge").lowHpDefenseBonus
        }));
      }

      return labels;
    }

    function monsterEffectLabels(monster) {
      ensureMonsterCombatState(monster);
      const labels = [];

      if (monster?.statusEffects?.burn) {
        labels.push(t("effects.burn", { turns: monster.statusEffects.burn.turns }));
      }

      return labels;
    }

    function clearCombatTimers() {
      if (combatAnimationTimer) {
        clearTimeout(combatAnimationTimer);
        combatAnimationTimer = null;
      }

      if (combatResolutionTimer) {
        clearTimeout(combatResolutionTimer);
        combatResolutionTimer = null;
      }

      state.combatAnimation = null;
      state.combatResolution = null;
    }

    function setCombatAnimation(action, duration = MONSTER_ANIMATION_DURATIONS[action] || 400) {
      if (combatAnimationTimer) {
        clearTimeout(combatAnimationTimer);
      }

      const token = `${action}-${Date.now()}-${Math.random()}`;
      state.combatAnimation = { action, token };

      combatAnimationTimer = setTimeout(() => {
        if (state.combatAnimation?.token === token) {
          state.combatAnimation = null;
          combatAnimationTimer = null;
          render();
        }
      }, duration);
    }

    function scheduleCombatResolution(callback, delay) {
      if (combatResolutionTimer) {
        clearTimeout(combatResolutionTimer);
      }

      const token = `resolution-${Date.now()}-${Math.random()}`;
      state.combatResolution = { token };

      combatResolutionTimer = setTimeout(() => {
        if (state.combatResolution?.token !== token) {
          return;
        }

        state.combatResolution = null;
        combatResolutionTimer = null;
        callback();
        render();
      }, delay);
    }

    function createAudioController() {
      const canUseAudio = typeof Audio === "function";
      const failedAssets = new Set();
      const sfxPools = new Map();
      const decks = canUseAudio ? [new Audio(), new Audio()] : [];
      let activeDeckIndex = 0;
      let currentBgmKey = "";
      let unlocked = false;
      let isReportingFailure = false;
      let settings = loadSettings();

      decks.forEach((deck) => {
        deck.loop = true;
        deck.preload = "auto";
        deck.volume = 0;
        deck.dataset.assetKey = "";
        deck.addEventListener("error", () => reportAudioFailure(deck.dataset.assetKey || deck.src || "BGM"));
      });

      document.addEventListener("visibilitychange", applyBgmVolume);

      function sanitizeVolume(value, fallback) {
        const numeric = Number(value);
        return Number.isFinite(numeric) ? clamp(numeric, 0, 1) : fallback;
      }

      function loadSettings() {
        try {
          const saved = JSON.parse(localStorage.getItem(AUDIO_SETTINGS_KEY) || "null");
          if (!saved || typeof saved !== "object") {
            return { ...DEFAULT_AUDIO_SETTINGS };
          }

          return {
            muted: typeof saved.muted === "boolean" ? saved.muted : DEFAULT_AUDIO_SETTINGS.muted,
            musicVolume: sanitizeVolume(saved.musicVolume, DEFAULT_AUDIO_SETTINGS.musicVolume),
            sfxVolume: sanitizeVolume(saved.sfxVolume, DEFAULT_AUDIO_SETTINGS.sfxVolume)
          };
        } catch (error) {
          return { ...DEFAULT_AUDIO_SETTINGS };
        }
      }

      function saveSettings() {
        localStorage.setItem(AUDIO_SETTINGS_KEY, JSON.stringify(settings));
      }

      function bgmVolume() {
        const visibilityMultiplier = document.hidden ? 0.25 : 1;
        return settings.muted ? 0 : settings.musicVolume * visibilityMultiplier;
      }

      function sfxVolume() {
        return settings.muted ? 0 : settings.sfxVolume;
      }

      function desiredBgmKey() {
        if (hasActiveCombat()) {
          return "combat";
        }

        const stageKey = ["village", "forest", "cave", "tomb"][clamp(Math.floor(Number(state.story.stage) || 0), 0, 3)];
        return stageKey || "village";
      }

      function applyBgmVolume() {
        if (!decks.length) {
          return;
        }

        decks[activeDeckIndex].volume = bgmVolume();
      }

      function crossfade(fromDeck, toDeck, duration = 1200) {
        const start = performance.now();
        const fromStart = fromDeck.volume;
        const target = bgmVolume();

        function step(now) {
          const progress = clamp((now - start) / duration, 0, 1);
          toDeck.volume = target * progress;
          fromDeck.volume = fromStart * (1 - progress);

          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            fromDeck.pause();
            fromDeck.currentTime = 0;
            fromDeck.volume = 0;
            toDeck.volume = target;
          }
        }

        requestAnimationFrame(step);
      }

      function reportAudioFailure(asset) {
        const key = String(asset || "audio");
        if (failedAssets.has(key) || isReportingFailure) {
          return;
        }

        failedAssets.add(key);
        isReportingFailure = true;
        addLog("logs.audioFailure");
        render();
        isReportingFailure = false;
      }

      function playElement(element, asset) {
        const playResult = element.play();
        if (playResult && typeof playResult.catch === "function") {
          playResult.catch(() => reportAudioFailure(asset));
        }
      }

      function syncBgm() {
        if (!unlocked || !decks.length) {
          return;
        }

        const key = desiredBgmKey();
        const asset = BGM_ASSETS[key];
        if (!asset || failedAssets.has(asset) || key === currentBgmKey) {
          applyBgmVolume();
          return;
        }

        const nextDeckIndex = activeDeckIndex === 0 ? 1 : 0;
        const fromDeck = decks[activeDeckIndex];
        const toDeck = decks[nextDeckIndex];
        toDeck.src = asset;
        toDeck.dataset.assetKey = asset;
        toDeck.loop = true;
        toDeck.preload = "auto";
        toDeck.currentTime = 0;
        toDeck.volume = 0;
        activeDeckIndex = nextDeckIndex;
        currentBgmKey = key;
        playElement(toDeck, asset);
        crossfade(fromDeck, toDeck, key === "combat" ? 1000 : 1200);
      }

      function unlock() {
        if (unlocked) {
          return;
        }

        unlocked = true;
        syncBgm();
      }

      function playSfx(key) {
        if (!unlocked || !canUseAudio) {
          return;
        }

        const asset = SFX_ASSETS[key];
        if (!asset || failedAssets.has(asset)) {
          return;
        }

        const pool = sfxPools.get(key) || [];
        let voice = pool.find((item) => item.paused || item.ended);
        if (!voice && pool.length < 4) {
          voice = new Audio(asset);
          voice.preload = "auto";
          voice.addEventListener("error", () => reportAudioFailure(asset));
          pool.push(voice);
          sfxPools.set(key, pool);
        }

        if (!voice) {
          voice = pool[0];
        }

        voice.src = asset;
        voice.loop = false;
        voice.volume = sfxVolume();
        voice.currentTime = 0;
        playElement(voice, asset);
      }

      function toggleMute() {
        settings = { ...settings, muted: !settings.muted };
        saveSettings();
        applyBgmVolume();
        render();
      }

      function setMusicVolume(value) {
        settings = { ...settings, musicVolume: clamp(Number(value), 0, 1) };
        saveSettings();
        applyBgmVolume();
        render();
      }

      function setSfxVolume(value) {
        settings = { ...settings, sfxVolume: clamp(Number(value), 0, 1) };
        saveSettings();
        render();
      }

      function getSettings() {
        return { ...settings };
      }

      function getDebugState() {
        return {
          unlocked,
          currentBgmKey,
          failedAssets: [...failedAssets],
          poolSizes: Object.fromEntries([...sfxPools.entries()].map(([key, pool]) => [key, pool.length]))
        };
      }

      return {
        unlock,
        syncBgm,
        playSfx,
        toggleMute,
        setMusicVolume,
        setSfxVolume,
        getSettings,
        getDebugState
      };
    }

    const audioController = createAudioController();

    function setScreen(screen) {
      if (!SCREENS[screen]) {
        return;
      }

      if (screen !== "main" && hasUnloadedSave()) {
        loadExistingSaveBeforeAction();
        return;
      }

      if (screen !== "combat" && isCombatLocked()) {
        state.activeScreen = "combat";
        addCombatLog("combatLogs.combatLocked");
        render();
        return;
      }

      state.activeScreen = screen;
      saveGame();
      render();
    }

    function advanceStory(reasonKey, params = {}) {
      ensureStoryProgressState();
      const existingBoss = pendingBossDefinition();
      if (existingBoss) {
        addLog("logs.bossBlocks", { bossName: bossNameParam(existingBoss) });
        saveGame();
        return;
      }

      state.story.progress += 1;

      if (reasonKey) {
        if (reasonKey.startsWith("special")) {
          audioController.playSfx("discovery");
        }
        if (getTranslationValue(I18N[DEFAULT_LANGUAGE], `logs.${reasonKey}`) === undefined) {
          addLiteralLog(reasonKey);
        } else {
          addLog(`logs.${reasonKey}`, params);
        }
      }

      const boss = pendingBossDefinition();
      if (boss) {
        audioController.playSfx("discovery");
        addLog("logs.bossAppears", { bossName: bossNameParam(boss) });
        saveGame();
        return;
      }

      saveGame();
    }

    function unlockStageAfterBoss(boss) {
      ensureStoryProgressState();

      if (!hasDefeatedBoss(boss.id)) {
        state.story.defeatedBosses.push(boss.id);
      }

      if (boss.stage < stages.length - 1) {
        const nextStageIndex = boss.stage + 1;
        const nextStage = stages[nextStageIndex];
        state.story.stage = nextStageIndex;
        state.story.statusKey = nextStage.id;
        state.story.status = stageText(nextStageIndex, "status");
        audioController.playSfx("discovery");
        addLog(`logs.${boss.unlockLog}`);
        saveGame();
        return;
      }

      state.story.expeditionComplete = true;
      audioController.playSfx("discovery");
      addLog("logs.finalBossVictory");
      saveGame();
    }

    function gainGold(amount, reasonKey) {
      state.player.gold += amount;
      audioController.playSfx("gold");
      addLog("logs.gainGold", { reason: translatedParam(`logReasons.${reasonKey}`), amount });
      saveGame();
    }

    function gainPotion(reasonKey) {
      state.player.potions += 1;
      addLog("logs.gainPotion", { reason: translatedParam(`logReasons.${reasonKey}`) });
      saveGame();
    }

    function restAtVillage() {
      const { player } = state;

      if (player.hp >= player.maxHp) {
        addLog("logs.restFullHp");
      } else {
        const missingHp = player.maxHp - player.hp;
        const restoredHp = Math.min(Math.ceil(player.maxHp * 0.35), missingHp);
        player.hp += restoredHp;
        addLog("logs.restRecover", { amount: restoredHp });
      }

      state.activeScreen = "adventure";
      saveGame();
    }

    function chooseExplorationEvent() {
      const eventId = EXPLORATION_EVENT_IDS[rand(0, EXPLORATION_EVENT_IDS.length - 1)];
      state.story.activeEvent = { id: eventId };
      addLog("logs.eventFound", { eventName: adventureEventTitleParam(eventId) });
      saveGame();
    }

    function advanceEventProgress(reasonKey, params = {}) {
      const eventId = state.story.activeEvent?.id;
      state.story.activeEvent = null;
      advanceStory(reasonKey, params);
      grantEventRelic(eventId);
      saveGame();
    }

    function damagePlayer(amount) {
      const damage = Math.max(1, amount);
      state.player.hp = Math.max(1, state.player.hp - damage);
      return damage;
    }

    function resolveExplorationEvent(eventId, choice) {
      const event = state.story.activeEvent;

      if (!event || event.id !== eventId) {
        chooseExplorationEvent();
        render();
        return;
      }

      if (eventId === "altar") {
        if (choice === "safe") {
          const healed = Math.min(BALANCE.events.altarSafeHeal, state.player.maxHp - state.player.hp);
          state.player.hp += healed;
          advanceEventProgress("eventAltarSafe", { amount: healed });
          return;
        }

        if (choice === "risk") {
          const damage = damagePlayer(rand(BALANCE.events.altarRiskDamageMin, BALANCE.events.altarRiskDamageMax));
          const gold = applyExplorationGold(rand(BALANCE.events.altarRiskGoldMin, BALANCE.events.altarRiskGoldMax));
          advanceEventProgress("eventAltarRisk", { damage, gold });
          return;
        }

        if (state.player.potions <= 0) {
          addLog("logs.eventNoPotion");
          return;
        }

        state.player.potions -= 1;
        const gold = applyExplorationGold(rand(BALANCE.events.altarResourceGoldMin, BALANCE.events.altarResourceGoldMax));
        advanceEventProgress("eventAltarResource", { gold });
        return;
      }

      if (eventId === "chest") {
        if (choice === "safe") {
          const gold = applyExplorationGold(rand(BALANCE.events.chestSafeGoldMin, BALANCE.events.chestSafeGoldMax));
          advanceEventProgress("eventChestSafe", { gold });
          return;
        }

        if (choice === "risk") {
          if (rand(1, 100) <= BALANCE.events.chestRiskCombatChance) {
            state.story.activeEvent = null;
            addLog("logs.eventChestRiskCombat");
            startCombat(true, "event", eventId);
            return;
          }

          const gold = applyExplorationGold(rand(BALANCE.events.chestRiskGoldMin, BALANCE.events.chestRiskGoldMax));
          advanceEventProgress("eventChestRiskGold", { gold });
          return;
        }

        const cost = BALANCE.events.chestResourceCost;
        if (state.player.gold < cost) {
          addLog("logs.eventNoGold");
          return;
        }

        state.player.gold -= cost;
        state.player.potions += 1;
        advanceEventProgress("eventChestResource", { cost });
        return;
      }

      if (eventId === "fork") {
        if (choice === "safe") {
          advanceEventProgress("eventForkSafe");
          return;
        }

        if (choice === "risk") {
          state.story.activeEvent = null;
          addLog("logs.eventForkRisk");
          startCombat(false, "event", eventId);
          return;
        }

        const damage = damagePlayer(rand(BALANCE.events.forkDamageMin, BALANCE.events.forkDamageMax));
        const gold = applyExplorationGold(rand(BALANCE.events.forkGoldMin, BALANCE.events.forkGoldMax));
        advanceEventProgress("eventForkResource", { damage, gold });
        return;
      }

      if (eventId === "traveler") {
        if (choice === "safe") {
          state.player.potions += 1;
          advanceEventProgress("eventTravelerSafe");
          return;
        }

        if (choice === "risk") {
          state.story.activeEvent = null;
          addLog("logs.eventTravelerRisk");
          startCombat(false, "event", eventId);
          return;
        }

        if (state.player.potions <= 0) {
          addLog("logs.eventNoPotion");
          return;
        }

        state.player.potions -= 1;
        const gold = applyExplorationGold(rand(BALANCE.events.travelerResourceGoldMin, BALANCE.events.travelerResourceGoldMax));
        state.story.keyFragment = true;
        advanceEventProgress("eventTravelerResource", { gold });
        return;
      }

      if (eventId === "reliquary") {
        if (choice === "safe") {
          advanceEventProgress("eventReliquarySafe");
          return;
        }

        if (choice === "risk") {
          const damage = damagePlayer(rand(BALANCE.events.reliquaryRiskDamageMin, BALANCE.events.reliquaryRiskDamageMax));
          const gold = applyExplorationGold(rand(BALANCE.events.reliquaryRiskGoldMin, BALANCE.events.reliquaryRiskGoldMax));
          advanceEventProgress("eventReliquaryRisk", { damage, gold });
          return;
        }

        const cost = BALANCE.events.reliquaryResourceCost;
        if (state.player.gold < cost) {
          addLog("logs.eventNoGold");
          return;
        }

        state.player.gold -= cost;
        const amount = Math.min(BALANCE.events.reliquaryResourceHeal, state.player.maxHp - state.player.hp);
        state.player.hp += amount;
        advanceEventProgress("eventReliquaryResource", { cost, amount });
        return;
      }

      if (eventId === "supplyCache") {
        if (choice === "safe") {
          const gold = applyExplorationGold(rand(BALANCE.events.supplySafeGoldMin, BALANCE.events.supplySafeGoldMax));
          advanceEventProgress("eventSupplyCacheSafe", { gold });
          return;
        }

        if (choice === "risk") {
          const gold = applyExplorationGold(rand(BALANCE.events.supplyRiskGoldMin, BALANCE.events.supplyRiskGoldMax));
          state.player.potions += 1;
          advanceEventProgress("eventSupplyCacheRisk", { gold });
          return;
        }

        if (state.player.potions <= 0) {
          addLog("logs.eventNoPotion");
          return;
        }

        state.player.potions -= 1;
        const gold = applyExplorationGold(rand(BALANCE.events.supplyResourceGoldMin, BALANCE.events.supplyResourceGoldMax));
        advanceEventProgress("eventSupplyCacheResource", { gold });
      }
    }

    function handleExplorationEventChoice(eventId, choice) {
      resolveExplorationEvent(eventId, choice);

      if (state.activeScreen !== "combat") {
        render();
      }
    }

    function resolveAdventureEvent(source) {
      ensureStoryProgressState();

      if (state.story.expeditionComplete && source !== "village") {
        addLog("logs.expeditionComplete");
        saveGame();
        return;
      }

      const boss = pendingBossDefinition();
      if (boss && source !== "challengeBoss" && source !== "village") {
        addLog("logs.bossBlocks", { bossName: bossNameParam(boss) });
        return;
      }

      if (source === "village") {
        const event = rand(1, 3);

        if (event === 1) {
          gainGold(rand(4, 9), "villageWax");
        } else if (event === 2) {
          gainPotion("abandonedCabinet");
        } else {
          advanceStory("villageOldMan");
          return;
        }

        advanceStory();
        return;
      }

      if (source === "challengeBoss") {
        startBossCombat();
        return;
      }

      if (source === "challenge") {
        state.story.activeEvent = null;
        startCombat(true, "challenge");
        return;
      }

      if (source === "forest" && state.story.stage === 0) {
        addLog("logs.forestForcedCombat");
        startCombat(false, "forest");
        return;
      }

      if (source === "cave" && state.story.stage < 1) {
        addLog("logs.caveBlocked");
        return;
      }

      if (source === "deep" && state.story.stage < 2) {
        addLog("logs.deepBlocked");
        return;
      }

      if (state.story.activeEvent) {
        return;
      }

      chooseExplorationEvent();
    }

    function handleAdventureChoice(choice) {
      if (choice === "rest") {
        restAtVillage();
      } else {
        resolveAdventureEvent(choice);
      }

      if (state.activeScreen !== "combat") {
        render();
      }
    }

    function generateMonster(strong = false, source = "wild", eventId = null) {
      const playerLevel = state.player.level;
      const stageIndex = currentStageIndex();
      const balance = BALANCE.monsters;
      let attack = balance.baseAttack + stageIndex * balance.attackPerStage;
      let defense = balance.baseDefense
        + Math.floor((playerLevel - 1) / 2) * balance.defensePerTwoLevels
        + Math.floor(stageIndex / 2) * balance.defensePerTwoStages;

      for (let level = 2; level <= playerLevel; level += 1) {
        attack += rand(balance.attackPerLevelMin, balance.attackPerLevelMax);
      }

      let maxHp = balance.baseHp
        + playerLevel * balance.hpPerLevel
        + rand(0, playerLevel * balance.hpRandomPerLevel)
        + stageIndex * balance.hpPerStage;

      if (strong) {
        maxHp = Math.ceil(maxHp * balance.strongHpMultiplier);
        attack += balance.strongAttackBonus;
        defense += balance.strongDefenseBonus;
      }

      const monsterId = monsterIds[rand(0, monsterIds.length - 1)];

      const monster = {
        monsterId,
        name: t(`monsters.${monsterId}`),
        maxHp,
        hp: maxHp,
        attack,
        defense,
        ability: monsterId,
        statusEffects: {},
        strong,
        boss: false,
        source,
        eventId
      };
      ensureMonsterCombatState(monster);
      return monster;
    }

    function createBossMonster(boss) {
      const hpStageScale = boss.stage * BALANCE.bosses.hpPerStage;
      const attackStageScale = Math.floor(boss.stage / 2) * BALANCE.bosses.attackEveryTwoStages;
      const monster = {
        monsterId: boss.monsterId,
        name: t(boss.nameKey),
        maxHp: boss.maxHp + hpStageScale,
        hp: boss.maxHp + hpStageScale,
        attack: boss.attack + attackStageScale,
        defense: boss.defense,
        ability: boss.ability,
        statusEffects: {},
        strong: true,
        boss: true,
        bossId: boss.id,
        expReward: boss.exp,
        goldReward: boss.gold,
        source: "boss"
      };
      ensureMonsterCombatState(monster);
      return monster;
    }

    function startCombat(strong = false, source = "wild", eventId = null) {
      if (hasActiveCombat()) {
        state.activeScreen = "combat";
        render();
        return;
      }

      clearCombatTimers();
      clearCombatEffects();
      const monster = generateMonster(strong, source, eventId);
      ensureMonsterCombatState(monster);
      state.currentMonster = monster;
      state.combatLogs = [];
      addCombatLog("combatLogs.combatStart", {
        enemyType: translatedParam(monster.strong ? "combatLogs.strongEnemy" : "combatLogs.enemy"),
        monsterName: monsterNameParam(monster)
      });
      state.activeScreen = "combat";
      render();
    }

    function startBossCombat() {
      const boss = pendingBossDefinition();

      if (!boss) {
        resolveAdventureEvent("challenge");
        return;
      }

      if (hasActiveCombat()) {
        state.activeScreen = "combat";
        render();
        return;
      }

      clearCombatTimers();
      clearCombatEffects();
      state.story.activeEvent = null;
      const monster = createBossMonster(boss);
      state.currentMonster = monster;
      state.combatLogs = [];
      addCombatLog("combatLogs.combatStart", {
        enemyType: translatedParam("combatLogs.strongEnemy"),
        monsterName: monsterNameParam(monster)
      });
      triggerBossEntryRelic(boss);
      state.activeScreen = "combat";
      render();
    }

    function playerAttack() {
      useSkill("basicAttack");
    }

    function useSkill(skillId) {
      const monster = state.currentMonster;

      if (isCombatBusy()) {
        render();
        return;
      }

      if (state.activeScreen !== "combat" || !monster || monster.hp <= 0) {
        addCombatLog("combatLogs.combatEnded");
        render();
        return;
      }

      ensurePlayerCombatState();
      ensureMonsterCombatState(monster);

      if (!isSkillAvailable(skillId, monster)) {
        addCombatLog("combatLogs.skillUnavailable", { skillName: skillName(skillId) });
        render();
        return;
      }

      const skill = skillDefinition(skillId);
      let damage = 0;
      let usesHurtAnimation = false;

      if (skill.id === "heavyStrike") {
        const config = BALANCE.skills.heavyStrike;
        damage = calculateDamage(Math.ceil(state.player.attack * config.damageMultiplier) + config.flatBonus, monster.defense);
        monster.hp = Math.max(0, monster.hp - damage);
        state.player.effects.heavyRecovering = { turns: config.recoveryTurns };
        usesHurtAnimation = true;
        audioController.playSfx("playerAttack");
        audioController.playSfx("criticalHit");
        addCombatLog("combatLogs.heavyStrike", { monsterName: monsterNameParam(monster), damage });
      } else if (skill.id === "defend") {
        state.player.effects.guarded = { reduction: BALANCE.skills.defend.damageReduction };
        addCombatLog("combatLogs.defend");
      } else if (skill.id === "burningCurse") {
        const config = BALANCE.skills.burningCurse;
        damage = calculateDamage(Math.ceil(state.player.attack * config.directMultiplier), monster.defense);
        monster.hp = Math.max(0, monster.hp - damage);
        monster.statusEffects.burn = {
          turns: config.burnTurns,
          damage: Math.max(config.minBurnDamage, Math.ceil(state.player.attack * config.burnMultiplier))
        };
        usesHurtAnimation = true;
        audioController.playSfx("playerAttack");
        addCombatLog("combatLogs.burningCurse", { monsterName: monsterNameParam(monster), damage });
      } else {
        damage = calculateDamage(state.player.attack, monster.defense);
        monster.hp = Math.max(0, monster.hp - damage);
        usesHurtAnimation = true;
        audioController.playSfx("playerAttack");
        addCombatLog("combatLogs.playerAttack", { monsterName: monsterNameParam(monster), damage });
      }

      if (monster.hp <= 0) {
        finishVictory();
        render();
        return;
      }

      if (usesHurtAnimation) {
        setCombatAnimation("hurt");
      }

      scheduleCombatResolution(() => {
        const statusDefeatedMonster = applyMonsterStatusEffects(monster);
        if (statusDefeatedMonster) {
          finishVictory();
          return;
        }

        const statusDefeatedPlayer = applyPlayerStatusEffects();
        if (statusDefeatedPlayer) {
          handleDefeat();
          return;
        }

        monsterAttack();
      }, usesHurtAnimation ? MONSTER_ANIMATION_DURATIONS.hurt : 160);
      render();
    }

    function applyMonsterDamage(rawAttack, logKey = "combatLogs.monsterCounter") {
      const monster = state.currentMonster;
      const baseDamage = calculateDamage(rawAttack, playerEffectiveDefense());
      let damage = baseDamage;

      if (state.player.effects.guarded) {
        const guardReduction = Number(state.player.effects.guarded.reduction);
        const reductionFactor = Number.isFinite(guardReduction) ? guardReduction : 0.55;
        const reduction = Math.min(baseDamage - 1, Math.max(0, Math.ceil(baseDamage * reductionFactor)));
        damage = Math.max(1, baseDamage - reduction);
        delete state.player.effects.guarded;
        if (reduction > 0) {
          addCombatLog("combatLogs.guardReduced", { amount: reduction });
        }
      }

      state.player.hp = Math.max(0, state.player.hp - damage);
      audioController.playSfx("monsterAttack");
      audioController.playSfx("playerHit");
      addCombatLog(logKey, { monsterName: monsterNameParam(monster), damage });
      return damage;
    }

    function monsterAttack() {
      const monster = state.currentMonster;

      if (!monster || monster.hp <= 0) {
        return;
      }

      ensurePlayerCombatState();
      ensureMonsterCombatState(monster);
      setCombatAnimation("attack");
      const ability = monsterAbilityId(monster);
      const config = MONSTER_ABILITIES[ability] || {};

      if (ability === "slime" && monster.hp < monster.maxHp && rand(1, 100) <= config.healChance) {
        const healed = Math.min(rand(config.healMin, config.healMax), monster.maxHp - monster.hp);
        if (healed > 0) {
          monster.hp += healed;
          addCombatLog("combatLogs.slimeHeal", { monsterName: monsterNameParam(monster), amount: healed });
        }
      }

      applyMonsterDamage(monster.attack);

      if (state.player.hp > 0 && ability === "wolf" && rand(1, 100) <= config.extraStrikeChance) {
        applyMonsterDamage(Math.ceil(monster.attack * config.extraStrikeMultiplier), "combatLogs.wolfDoubleStrike");
      }

      if (
        state.player.hp > 0 &&
        ability === "blackCandleCultist" &&
        !state.player.effects.blackCandleCurse &&
        rand(1, 100) <= config.curseChance
      ) {
        state.player.effects.blackCandleCurse = {
          turns: config.curseTurns,
          damage: config.curseDamage,
          defensePenalty: config.defensePenalty
        };
        addCombatLog("combatLogs.cultistCurse", { monsterName: monsterNameParam(monster) });
      }

      reducePlayerTurnEffects();

      if (state.player.hp <= 0) {
        handleDefeat();
      }
    }

    function finishVictory() {
      const monster = state.currentMonster;

      if (!monster) {
        return;
      }

      const boss = monster.bossId ? BOSS_DEFINITIONS.find((item) => item.id === monster.bossId) : null;
      const multiplier = monster.strong && !boss ? BALANCE.rewards.strongMultiplier : 1;
      const stageIndex = currentStageIndex();
      const expReward = boss
        ? monster.expReward
        : Math.ceil((rand(BALANCE.rewards.normalExpMin, BALANCE.rewards.normalExpMax) + stageIndex * BALANCE.rewards.expPerStage) * multiplier);
      const goldReward = boss
        ? monster.goldReward
        : Math.ceil((rand(BALANCE.rewards.normalGoldMin, BALANCE.rewards.normalGoldMax) + stageIndex * BALANCE.rewards.goldPerStage) * multiplier);
      state.player.exp += expReward;
      state.player.gold += goldReward;
      audioController.playSfx("victory");
      audioController.playSfx("gold");
      setCombatAnimation("death", MONSTER_ANIMATION_DURATIONS.death);

      addCombatLog("combatLogs.victory", { monsterName: monsterNameParam(monster), exp: expReward, gold: goldReward });
      addLog(boss ? "logs.bossVictory" : "logs.victory", {
        bossName: boss ? bossNameParam(boss) : undefined,
        monsterName: monsterNameParam(monster),
        exp: expReward,
        gold: goldReward
      });

      if (hasRelic("emberCharm") && state.player.hp < state.player.maxHp) {
        const relic = relicDefinition("emberCharm");
        const healed = Math.min(relic.killHeal, state.player.maxHp - state.player.hp);
        state.player.hp += healed;
        addCombatLog("combatLogs.relicKillHeal", { relicName: relicNameParam(relic.id), amount: healed });
        addLog("logs.relicKillHeal", { relicName: relicNameParam(relic.id), amount: healed });
      }

      scheduleCombatResolution(() => {
        state.currentMonster = null;
        state.combatAnimation = null;
        clearCombatEffects();
        if (boss) {
          unlockStageAfterBoss(boss);
          grantBossRelic(boss.id);
        } else {
          advanceStory("combatTrace", { stageName: translatedParam(`stages.${currentStage().id}.name`) });
          if (monster.source === "event" && monster.eventId) {
            grantEventRelic(monster.eventId);
          }
        }
        checkLevelUps();
        state.activeScreen = "adventure";
        saveGame();
      }, MONSTER_ANIMATION_DURATIONS.death);
    }

    function handleDefeat() {
      const monster = state.currentMonster;
      ensurePlayerCombatState();
      let lostGold = Math.min(state.player.gold, rand(3, 10));
      if (hasRelic("burialCoin") && !state.player.relicStates.burialCoinSpent) {
        lostGold = 0;
        state.player.relicStates.burialCoinSpent = true;
        addCombatLog("combatLogs.relicDeathProtection", { relicName: relicNameParam("burialCoin") });
        addLog("logs.relicDeathProtection", { relicName: relicNameParam("burialCoin") });
      }

      state.player.gold -= lostGold;
      state.player.hp = 1;
      audioController.playSfx("defeat");
      addCombatLog("combatLogs.defeat", {
        monsterName: monster ? monsterNameParam(monster) : translatedParam("combatLogs.unknownEnemy"),
        gold: lostGold
      });
      addLog("logs.defeat", { gold: lostGold });
      scheduleCombatResolution(() => {
        state.currentMonster = null;
        state.combatAnimation = null;
        clearCombatEffects();
        state.activeScreen = "adventure";
        saveGame();
      }, MONSTER_ANIMATION_DURATIONS.attack);
    }

    function tryFlee() {
      const monster = state.currentMonster;

      if (isCombatBusy()) {
        render();
        return;
      }

      if (!monster) {
        addCombatLog("combatLogs.noEnemy");
        state.activeScreen = "adventure";
        render();
        return;
      }

      if (rand(1, 100) <= 60) {
        addCombatLog("combatLogs.fleeSuccess", { monsterName: monsterNameParam(monster) });
        addLog("logs.fleeSuccess");
        audioController.playSfx("flee");
        state.currentMonster = null;
        clearCombatEffects();
        state.activeScreen = "adventure";
        saveGame();
        render();
        return;
      }

      addCombatLog("combatLogs.fleeFail");
      ensurePlayerCombatState();
      ensureMonsterCombatState(monster);

      if (monsterAbilityId(monster) === "shadowBeast") {
        const config = MONSTER_ABILITIES.shadowBeast;
        const rawPenalty = Math.max(
          config.fleePenaltyMin,
          calculateDamage(Math.ceil(monster.attack * config.fleePenaltyMultiplier), playerEffectiveDefense())
        );
        let penalty = rawPenalty;
        if (hasRelic("shadowTether")) {
          const relic = relicDefinition("shadowTether");
          penalty = Math.max(1, Math.ceil(rawPenalty * relic.shadowFleePenaltyMultiplier));
          addCombatLog("combatLogs.relicFleeGuard", {
            relicName: relicNameParam(relic.id),
            amount: rawPenalty - penalty
          });
        }

        state.player.hp = Math.max(0, state.player.hp - penalty);
        audioController.playSfx("playerHit");
        addCombatLog("combatLogs.shadowFleePunish", { monsterName: monsterNameParam(monster), damage: penalty });
        if (state.player.hp <= 0) {
          handleDefeat();
          render();
          return;
        }
      }

      monsterAttack();
      render();
    }

    function checkLevelUps() {
      const { player } = state;

      while (player.level < MAX_LEVEL && player.exp >= nextLevelExp(player.level)) {
        const neededExp = nextLevelExp(player.level);
        player.exp -= neededExp;
        player.level += 1;

        const attackIncrease = rand(BALANCE.levelUp.attackMin, BALANCE.levelUp.attackMax);
        const defenseIncrease = rand(BALANCE.levelUp.defenseMin, BALANCE.levelUp.defenseMax);
        const hpIncrease = rand(BALANCE.levelUp.hpMin, BALANCE.levelUp.hpMax);
        player.attack += attackIncrease;
        player.defense += defenseIncrease;
        player.maxHp += hpIncrease;

        const restoredHp = Math.min(
          player.maxHp - player.hp,
          Math.ceil(hpIncrease * BALANCE.levelUp.restoreHpMultiplier) + BALANCE.levelUp.restoreBase
        );
        player.hp += restoredHp;
        audioController.playSfx("levelUp");
        addLog("logs.levelUp", {
          level: player.level,
          attack: attackIncrease,
          defense: defenseIncrease,
          hp: hpIncrease,
          restoredHp
        });
      }

      if (player.level >= MAX_LEVEL) {
        player.exp = 0;
      }
    }

    function buyPotion() {
      const { player } = state;

      if (player.gold < POTION_PRICE) {
        addLog("logs.purchaseFailure", { price: POTION_PRICE });
        render();
        return;
      }

      player.gold -= POTION_PRICE;
      player.potions += 1;
      audioController.playSfx("purchase");
      addLog("logs.purchaseSuccess", { price: POTION_PRICE });
      saveGame();
      render();
    }

    function usePotion(context = "inventory") {
      const { player } = state;

      if (context === "combat" && isCombatBusy()) {
        render();
        return;
      }

      if (context !== "inventory" && context !== "combat") {
        addLog("logs.invalidPotionContext");
        render();
        return;
      }

      if (context === "combat" && (state.activeScreen !== "combat" || !hasActiveCombat())) {
        addLog("logs.noActiveCombatPotion");
        render();
        return;
      }

      if (context === "inventory" && hasActiveCombat()) {
        state.activeScreen = "combat";
        addCombatLog("combatLogs.inventoryBlockedByCombat");
        render();
        return;
      }

      const log = context === "combat" ? addCombatLog : addLog;
      const potionLogScope = context === "combat" ? "combatLogs" : "logs";

      if (player.potions <= 0) {
        log(`${potionLogScope}.noPotion`);
        render();
        return;
      }

      if (player.hp >= player.maxHp) {
        log(`${potionLogScope}.hpFullNoPotion`);
        render();
        return;
      }

      const baseHeal = rand(POTION_HEAL.min, POTION_HEAL.max);
      let healed = Math.min(baseHeal, player.maxHp - player.hp);
      let relicBonus = 0;
      if (hasRelic("waxsealedVial") && healed > 0) {
        const relic = relicDefinition("waxsealedVial");
        const totalHeal = Math.min(baseHeal + relic.potionBonus, player.maxHp - player.hp);
        relicBonus = Math.max(0, totalHeal - healed);
        healed = totalHeal;
      }

      player.hp += healed;
      player.potions -= 1;
      audioController.playSfx("potion");
      log(`${potionLogScope}.usePotion`, { amount: healed });
      if (relicBonus > 0) {
        log(`${potionLogScope}.relicPotionBoost`, {
          relicName: relicNameParam("waxsealedVial"),
          amount: relicBonus
        });
      }

      if (context === "combat" && hasActiveCombat()) {
        const statusDefeatedPlayer = applyPlayerStatusEffects();
        if (statusDefeatedPlayer) {
          handleDefeat();
          render();
          return;
        }

        monsterAttack();
      }

      if (context === "inventory") {
        saveGame();
      }
      render();
    }

        ? document.activeElement
        : null;
      const focusKey = activeControl ? controlFocusKey(activeControl) : "";
      document.title = `${t("gameTitle")} | RPG`;

      app.innerHTML = `
        <header class="topbar">
          <div class="brand">
            <div class="brand-row">
              <svg class="black-candle-sigil" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                <path d="M32 6 45 18 58 20 50 32 53 48 38 45 32 58 26 45 11 48 14 32 6 20 19 18Z" fill="#070605" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
                <path d="M32 14c4 5 3 8 0 11-3-3-4-6 0-11Z" fill="#d6a84f"/>
                <path d="M25 26h14v18H25z" fill="#0e0b09" stroke="#6f8760" stroke-width="2"/>
                <path d="M23 46h18M28 30h8M32 26v20" stroke="#7e91a0" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <h1>${escapeHtml(t("gameTitle"))}</h1>
            </div>
            <p>${escapeHtml(t("gameSubtitle"))}</p>
          </div>
          <div class="topbar-tools">
            ${renderLanguageControls()}
            ${renderAudioControls()}
            ${renderStatBar()}
          </div>
        </header>
        ${renderNav()}
        <main class="layout">
          ${renderActiveScreen()}
          ${renderLogs()}
        </main>
      `;

      if (focusKey) {
        const focusTarget = Array.from(app.querySelectorAll("button, input, select"))
          .find((control) => controlFocusKey(control) === focusKey);

        if (focusTarget && !focusTarget.disabled) {
          focusTarget.focus();
        } else {
          const screenHeading = app.querySelector(".panel h2");

          if (screenHeading) {
            screenHeading.tabIndex = -1;
            screenHeading.focus();
          }
        }
      }

      updateGameAnnouncer();
      audioController.syncBgm();
    }

    app.addEventListener("click", (event) => {
      if (event.target.closest("button, input, select")) {
        audioController.unlock();
      }
    });

    app.addEventListener("keydown", (event) => {
      if ((event.key === "Enter" || event.key === " ") && event.target.closest("button, input, select")) {
        audioController.unlock();
      }
    });

    readSavePayload();
    render();
  </script>
</body>
</html>
