<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黑燭地牢 | RPG</title>
  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    :root {
      --bg: #090807;
      --panel: #15120f;
      --panel-2: #201913;
      --line: #3a2c21;
      --text: #efe6d3;
      --muted: #a89780;
      --bone: #d8ccb8;
      --moss: #6f8760;
      --steel: #7e91a0;
      --gold: #d6a84f;
      --rust: #9f4f2e;
      --blood: #8f1d1d;
      --poison: #5f8f3a;
      --shadow: rgba(0, 0, 0, 0.55);
      --focus: #9eb3c2;
    }

    * {
      box-sizing: border-box;
    }

    ::selection {
      background: rgba(126, 145, 160, 0.42);
      color: #fff8e8;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(159, 79, 46, 0.18), transparent 30%),
        radial-gradient(circle at 80% 12%, rgba(111, 135, 96, 0.1), transparent 28%),
        linear-gradient(135deg, #050403 0%, var(--bg) 50%, #120d0a 100%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: linear-gradient(180deg, var(--panel-2), #120f0d);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      padding: 10px 14px;
      transition: border-color 160ms ease, color 160ms ease, transform 160ms ease;
      min-height: 44px;
      overflow-wrap: anywhere;
      text-align: center;
    }

    button:hover {
      border-color: var(--gold);
      color: var(--gold);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
    }

    button:focus-visible,
    a:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
      border-color: var(--steel);
      box-shadow: 0 0 0 4px rgba(126, 145, 160, 0.18);
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 0;
      line-height: 1.08;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      max-width: 32rem;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .black-candle-sigil {
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      color: var(--bone);
      filter: drop-shadow(0 0 10px rgba(214, 168, 79, 0.22));
    }

    .quick-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 560px;
      min-width: min(100%, 280px);
    }

    .topbar-tools {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      min-width: min(100%, 320px);
    }

    .language-control {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .language-control select {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(21, 18, 15, 0.94);
      color: var(--text);
      font: inherit;
      padding: 6px 34px 6px 10px;
      cursor: pointer;
    }

    .audio-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      max-width: 560px;
      min-width: 0;
    }

    .audio-toggle {
      display: grid;
      place-items: center;
      width: 44px;
      min-width: 44px;
      padding: 0;
      border-radius: 6px;
      line-height: 1;
    }

    .audio-toggle svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
    }

    .audio-slider {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      min-width: 154px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(21, 18, 15, 0.86);
      color: var(--muted);
      padding: 6px 9px;
      font-size: 13px;
      white-space: nowrap;
    }

    .audio-slider input {
      width: 92px;
      accent-color: var(--gold);
      cursor: pointer;
    }

    .stat {
      flex: 1 1 96px;
      min-width: 96px;
      max-width: 124px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(21, 18, 15, 0.86);
      box-shadow: 0 10px 30px var(--shadow);
      padding: 8px 10px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .stat strong {
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .nav button {
      flex: 0 1 auto;
      min-width: 118px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel,
    .log-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(32, 25, 19, 0.96), rgba(14, 12, 10, 0.98));
      box-shadow: 0 18px 45px var(--shadow);
      padding: 18px;
    }

    .panel {
      min-height: 420px;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, rgba(216, 204, 184, 0.045), transparent 38%),
        radial-gradient(circle at 18px 18px, rgba(126, 145, 160, 0.08) 0 1px, transparent 1.5px);
      background-size: auto, 28px 28px;
      opacity: 0.7;
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .panel h2,
    .log-panel h2 {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 22px;
      letter-spacing: 0;
      line-height: 1.25;
    }

    .panel h3,
    .log-panel h3 {
      line-height: 1.3;
    }

    .panel p,
    .log-panel p {
      max-width: 68ch;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .actions button {
      flex: 0 1 auto;
      min-width: 112px;
    }

    .muted {
      color: var(--muted);
    }

    .guide {
      border-left: 3px solid var(--moss);
      background: rgba(111, 135, 96, 0.1);
      color: var(--text);
      padding: 12px 14px;
      margin: 12px 0;
    }

    .log-list {
      display: grid;
      gap: 10px;
      margin: 0;
    }

    .log-list p {
      margin: 0;
      border-bottom: 1px solid rgba(58, 44, 33, 0.7);
      color: var(--muted);
      padding-bottom: 10px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .info-grid div {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(21, 18, 15, 0.72);
      padding: 10px 12px;
      min-width: 0;
    }

    .shop-card {
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr) minmax(112px, auto);
      gap: 16px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 18, 15, 0.72);
      margin-top: 16px;
      padding: 16px;
      min-width: 0;
    }

    .shop-card h3 {
      margin: 0 0 6px;
      color: var(--gold);
      font-size: 18px;
    }

    .shop-card p {
      margin: 2px 0;
    }

    .shop-card .actions {
      margin-top: 0;
    }

    .item-icon {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 62px;
      height: 62px;
      border: 1px solid rgba(214, 168, 79, 0.42);
      border-radius: 8px;
      background: linear-gradient(150deg, rgba(214, 168, 79, 0.1), rgba(126, 145, 160, 0.08));
      font-size: 30px;
      line-height: 1;
      overflow: hidden;
    }

    .potion-art {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 5px;
      filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.55));
    }

    .scene-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 7;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        radial-gradient(circle at 70% 24%, rgba(159, 79, 46, 0.16), transparent 30%),
        linear-gradient(135deg, #15120f, #070605);
      isolation: isolate;
      margin: 12px 0 18px;
    }

    .scene-stage.compact {
      aspect-ratio: 16 / 5;
    }

    .scene-art {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .scene-stage::after {
      content: "";
      position: absolute;
      inset: 32% 0 0;
      z-index: 1;
      background: linear-gradient(transparent, rgba(5, 4, 3, 0.94));
      pointer-events: none;
    }

    .scene-caption {
      position: absolute;
      inset: auto 16px 14px;
      z-index: 3;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
      pointer-events: none;
    }

    .scene-copy {
      min-width: 0;
      max-width: min(58%, 38rem);
      text-shadow: 0 2px 12px #000, 0 1px 2px #000;
    }

    .scene-location,
    .scene-status {
      display: block;
      overflow-wrap: anywhere;
    }

    .scene-location {
      color: #fff4dc;
      font-size: clamp(17px, 2.4vw, 24px);
      font-weight: 700;
      line-height: 1.2;
    }

    .scene-status {
      margin-top: 3px;
      color: var(--bone);
      font-size: 13px;
    }

    .danger-marker {
      flex: 0 0 auto;
      border: 1px solid rgba(214, 168, 79, 0.72);
      border-radius: 4px;
      background: rgba(74, 14, 12, 0.86);
      color: #ffe4ad;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      padding: 7px 9px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
    }

    .monster-art {
      position: absolute;
      z-index: 2;
      right: 5%;
      bottom: 0;
      width: min(42%, 360px);
      height: 92%;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72));
      transform-origin: 50% 92%;
      animation: monster-idle 2.8s ease-in-out infinite;
      will-change: transform, filter, opacity;
    }

    .scene-stage.strong-enemy .monster-art {
      filter:
        drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72))
        drop-shadow(0 0 18px rgba(159, 79, 46, 0.72));
    }

    .scene-stage.monster-action-attack .monster-art {
      animation: monster-attack 520ms cubic-bezier(0.2, 0.9, 0.24, 1.05) both;
    }

    .scene-stage.monster-action-hurt .monster-art {
      animation: monster-hurt 360ms ease-out both;
    }

    .scene-stage.monster-action-death .monster-art {
      animation: monster-death 820ms cubic-bezier(0.13, 0.65, 0.22, 1) both;
    }

    .scene-stage.monster-action-attack::before,
    .scene-stage.monster-action-hurt::before,
    .scene-stage.monster-action-death::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
    }

    .scene-stage.monster-action-hurt::before,
    .scene-stage.monster-action-attack::before {
      background: radial-gradient(circle at 71% 45%, rgba(255, 228, 173, 0.32), transparent 18%);
      animation: impact-flash 360ms ease-out both;
    }

    .scene-stage.monster-action-death::before {
      background:
        radial-gradient(circle at 70% 50%, rgba(214, 168, 79, 0.22), transparent 20%),
        linear-gradient(90deg, transparent, rgba(7, 6, 5, 0.46));
      animation: death-haze 820ms ease-out both;
    }

    .scene-failed .scene-art,
    .monster-failed .monster-art,
    .potion-failed .potion-art {
      display: none;
    }

    img[hidden] {
      display: none !important;
    }

    @keyframes monster-idle {
      0%,
      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(0, -5px, 0) scale(1.015);
      }
    }

    @keyframes monster-attack {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      24% {
        transform: translate3d(7%, -2%, 0) scale(0.98, 1.04) rotate(-1deg);
      }

      56% {
        transform: translate3d(-14%, 2%, 0) scale(1.1, 0.96) rotate(2deg);
        filter: drop-shadow(0 20px 26px rgba(0, 0, 0, 0.74)) brightness(1.16);
      }

      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes monster-hurt {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72));
      }

      20% {
        transform: translate3d(5%, 0, 0) scale(1.04, 0.96) rotate(2deg);
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72)) brightness(1.6) saturate(1.25);
      }

      45% {
        transform: translate3d(-4%, 1%, 0) scale(0.97, 1.03) rotate(-2deg);
      }

      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes monster-death {
      0% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72)) brightness(1.2);
      }

      30% {
        opacity: 0.92;
        transform: translate3d(2%, -3%, 0) scale(1.06, 0.94) rotate(3deg);
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.72)) grayscale(0.45) brightness(1.25);
      }

      72% {
        opacity: 0.45;
        transform: translate3d(9%, 13%, 0) scale(0.82, 0.72) rotate(9deg);
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.62)) grayscale(0.8) brightness(0.78);
      }

      100% {
        opacity: 0;
        transform: translate3d(14%, 24%, 0) scale(0.56, 0.42) rotate(13deg);
        filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.45)) grayscale(1) brightness(0.45);
      }
    }

    @keyframes impact-flash {
      0% {
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes death-haze {
      0% {
        opacity: 0;
      }

      35% {
        opacity: 0.82;
      }

      100% {
        opacity: 0;
      }
    }

    .combat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .combatant {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 18, 15, 0.72);
      padding: 14px;
      min-width: 0;
    }

    .combatant.danger {
      border-color: rgba(143, 29, 29, 0.82);
      background: rgba(44, 14, 12, 0.72);
    }

    .combatant h3 {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 18px;
    }

    .effect-list {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin: 8px 0 0;
    }

    .skill-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      margin-top: 14px;
    }

    .skill-card {
      align-items: stretch;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 18, 15, 0.62);
      display: grid;
      gap: 8px;
      min-width: 0;
      padding: 10px;
    }

    .skill-card button {
      width: 100%;
    }

    .skill-card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin: 0;
    }

    .meter {
      overflow: hidden;
      height: 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #080706;
      margin: 8px 0 10px;
      min-width: 0;
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--poison), #9fca62);
    }

    .meter.enemy span {
      background: linear-gradient(90deg, var(--blood), var(--rust));
    }

    .combat-log {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      max-height: 240px;
      overflow: auto;
    }

    .combat-log p {
      margin: 0;
      border-bottom: 1px solid rgba(58, 44, 33, 0.7);
      color: var(--muted);
      padding-bottom: 8px;
    }

    @media (max-width: 860px) {
      .app {
        width: min(100% - 20px, 680px);
        padding: 16px 0;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .quick-stats {
        justify-content: flex-start;
      }

      .topbar-tools,
      .audio-controls {
        align-items: stretch;
        justify-content: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .combat-grid {
        grid-template-columns: 1fr;
      }

      .skill-grid {
        grid-template-columns: 1fr;
      }

      .nav button,
      .actions button {
        flex: 1 1 140px;
        min-width: min(100%, 140px);
      }
    }

    @media (max-width: 620px) {
      .brand-row {
        gap: 10px;
      }

      .black-candle-sigil {
        width: 34px;
        height: 34px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .shop-card {
        grid-template-columns: 54px minmax(0, 1fr);
        gap: 12px;
        padding: 12px;
      }

      .item-icon {
        width: 54px;
        height: 54px;
      }

      .scene-stage,
      .scene-stage.compact {
        aspect-ratio: 4 / 3;
      }

      .monster-art {
        right: 16%;
        width: 68%;
        height: 84%;
      }

      .scene-caption {
        inset: auto 12px 10px;
        gap: 8px;
      }

      .scene-copy {
        max-width: 72%;
      }

      .scene-location {
        font-size: 18px;
      }

      .shop-card .actions {
        grid-column: 1 / -1;
      }

      .audio-slider {
        flex: 1 1 150px;
        min-width: min(100%, 150px);
      }

      .audio-slider input {
        flex: 1 1 auto;
        width: min(120px, 38vw);
      }
    }

    @media (max-width: 360px) {
      .app {
        width: calc(100% - 16px);
      }

      .brand h1 {
        font-size: 27px;
      }

      .stat {
        max-width: none;
      }

      .shop-card {
        grid-template-columns: 48px minmax(0, 1fr);
      }

      .item-icon {
        width: 48px;
        height: 48px;
        font-size: 26px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 0.001ms !important;
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }

      button:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div id="app" class="app"></div>
  <div id="game-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <script>
    const app = document.getElementById("app");
    const gameAnnouncer = document.getElementById("game-announcer");
    const MAX_LEVEL = 100;
    const POTION_PRICE = 15;
    const POTION_HEAL = { min: 5, max: 18 };
    const MONSTER_ANIMATION_DURATIONS = {
      attack: 520,
      hurt: 360,
      death: 820
    };
    const monsterIds = ["slime", "goblin", "skeleton", "wolf", "shadowBeast", "fleshGuard", "tombHunter", "blackCandleCultist"];
    const sceneAssets = [
      "assets/images/scene-ash-village.webp",
      "assets/images/scene-rotten-forest.webp",
      "assets/images/scene-damp-cave.webp",
      "assets/images/scene-old-king-tomb.webp"
    ];
    const monsterAssets = {
      slime: "assets/images/monster-slime.webp",
      goblin: "assets/images/monster-goblin.webp",
      skeleton: "assets/images/monster-skeleton.webp",
      wolf: "assets/images/monster-wolf.webp",
      shadowBeast: "assets/images/monster-shadow-beast.webp",

    const state = {

    function rand(min, max) {

    function clamp(value, min, max) {

    function sanitizeLanguage(language) {
      return Object.prototype.hasOwnProperty.call(LANGUAGES, language) ? language : DEFAULT_LANGUAGE;

    function loadLanguage() {
      try {

    let currentLanguage = loadLanguage();
    document.documentElement.lang = LANGUAGES[currentLanguage].htmlLang;

    function interpolate(template, params = {}) {
      return String(template).replace(/\{([^{}]+)\}/g, (match, key) => {
        const value = params[key.trim()];
        return value == null ? "" : String(value);
      });
    }

    function getTranslationValue(dictionary, key) {
      return key.split(".").reduce((value, part) => (
        value && Object.prototype.hasOwnProperty.call(value, part) ? value[part] : undefined
      ), dictionary);
    }

    function t(key, params = {}) {
      const activeDictionary = I18N[currentLanguage] || I18N[DEFAULT_LANGUAGE];
      const fallbackDictionary = I18N[DEFAULT_LANGUAGE];
      const template = getTranslationValue(activeDictionary, key) ?? getTranslationValue(fallbackDictionary, key) ?? key;
      return interpolate(template, params);
    }

    function translatedParam(key, params = {}) {
      return { __translationKey: key, params };
    }

    function resolveLogParams(params = {}) {
      return Object.fromEntries(Object.entries(params).map(([key, value]) => {
        if (value && typeof value === "object" && value.__translationKey) {
          return [key, t(value.__translationKey, resolveLogParams(value.params))];
        }

        return [key, value];
      }));
    }

    function logEntry(key, params = {}) {
      return { key, params };
    }

    function literalLogEntry(message) {
      return { key: String(message || ""), params: {}, literal: true };
    }

    function formatLogEntry(entry) {
      if (entry && typeof entry === "object" && entry.key) {
        if (entry.literal) {
          return String(entry.key);
        }

        return t(entry.key, resolveLogParams(entry.params));
      }

      return String(entry || "");
    }

    function monsterNameParam(monster) {

      return monsterId ? translatedParam(`monsters.${monsterId}`) : monsterName(monster);

    function escapeHtml(value) {

        .replaceAll("'", "&#039;");

    function currentStageIndex() {

    function currentStoryStatus() {

    function normalizeMonsterId(monster) {
      if (monster && typeof monster === "object" && monster.monsterId) {
        const monsterId = String(monster.monsterId);

      }

      const rawName = monster && typeof monster === "object" ? monster.name : monster;
      const baseName = String(rawName || "")
        .replace(/^(强敌|強敵|Strong enemy|Enemy)\s*/i, "")
        .replace(/（(强敌|強敵)）$/, "")
        .replace(/\s*\((Strong enemy)\)$/i, "")
        .trim();
      return legacyMonsterNameIds[baseName] || "";
    }

    function monsterName(monster) {
      const monsterId = normalizeMonsterId(monster);
      if (monsterId) {

      if (monster && typeof monster === "object" && monster.name) {

      return String(monster || "");

    function activeMonsterAction() {

    function handleAssetError(image) {

    }

    function renderSceneStage({ scene, location, status, monster = null, compact = false }) {
      const requestedScene = String(scene || "");
      const sceneSource = escapeHtml(knownSceneAssets.has(requestedScene) ? requestedScene : defaultSceneAsset);
      const locationLabel = escapeHtml(location || t("common.unknownArea"));
      const statusLabel = escapeHtml(status || "");
      const displayMonsterName = monster ? monsterName(monster) : "";
      const monsterAction = monster ? activeMonsterAction() : "idle";
      const monsterSource = monsterActionAsset(monster, monsterAction);
      const strongEnemy = Boolean(monster && monster.strong);
      const stageClasses = [
        "scene-stage",

    function sceneStage(options) {

    function addLog(key, params = {}) {
      state.logs.unshift(logEntry(key, params));
      state.logs = state.logs.slice(0, 8);
      logRevision += 1;
    }

    function addLiteralLog(message) {
      state.logs.unshift(literalLogEntry(message));
      state.logs = state.logs.slice(0, 8);
      logRevision += 1;
    }

    function addCombatLog(key, params = {}) {
      state.combatLogs.push(logEntry(key, params));
      state.combatLogs = state.combatLogs.slice(-8);
      combatLogRevision += 1;
    }

    function controlFocusKey(control) {
      const stableKey = control.getAttribute("data-focus-key");
      if (stableKey) {
        return `${control.tagName}|${stableKey}`;
      }

      const action = control.getAttribute("onclick") || control.getAttribute("oninput") || control.getAttribute("onchange") || "";
      const label = control.getAttribute("aria-label") || control.textContent.trim().replace(/\s+/g, " ");
      return `${control.tagName}|${control.type || ""}|${action}|${label}`;
    }

    function updateGameAnnouncer() {
      const latestLog = formatLogEntry(state.logs[0]);
      const latestCombatLog = formatLogEntry(state.combatLogs[state.combatLogs.length - 1]);
      const messages = [];

      if (logRevision !== lastAnnouncedLogRevision && latestLog) {
        messages.push(latestLog);
      }

      if (combatLogRevision !== lastAnnouncedCombatLogRevision && latestCombatLog) {
        messages.push(latestCombatLog);
      }

      lastAnnouncedLogRevision = logRevision;
      lastAnnouncedCombatLogRevision = combatLogRevision;

      if (messages.length) {
        const announcement = messages.join(" ");
        gameAnnouncer.textContent = "";
        queueMicrotask(() => {
          gameAnnouncer.textContent = announcement;
        });
      }
    }

    function hasActiveCombat() {
      return Boolean(state.currentMonster && state.currentMonster.hp > 0 && state.player.hp > 0);
    }

    function isCombatBusy() {
      return Boolean(state.combatAnimation || state.combatResolution);
    }

    function isCombatLocked() {
      return Boolean(state.currentMonster || state.combatResolution);
    }

    function ensurePlayerCombatState() {
      if (!Array.isArray(state.player.skills)) {
        state.player.skills = SKILL_DEFINITIONS.map((skill) => skill.id);
      }

      if (!state.player.effects || typeof state.player.effects !== "object") {

      if (!Array.isArray(state.player.relics)) {
        state.player.relics = [];

    function ensureMonsterCombatState(monster) {
      if (!monster || typeof monster !== "object") {

      if (!monster.ability) {

      if (!monster.statusEffects || typeof monster.statusEffects !== "object") {

    function clearCombatEffects() {

    function skillDefinition(skillId) {
      return SKILL_DEFINITIONS.find((skill) => skill.id === skillId) || SKILL_DEFINITIONS[0];
    }

    function skillName(skillId) {
      return t(skillDefinition(skillId).nameKey);
    }

    function availableSkillDefinitions() {
      ensurePlayerCombatState();
      const unlocked = new Set(state.player.skills);
      return SKILL_DEFINITIONS.filter((skill) => unlocked.has(skill.id));
    }

    function isSkillAvailable(skillId, monster = state.currentMonster) {
      ensurePlayerCombatState();
      ensureMonsterCombatState(monster);

      if (!monster || monster.hp <= 0 || state.player.hp <= 0 || isCombatBusy()) {
        return false;
      }

      if (skillId === "heavyStrike" && state.player.effects.heavyRecovering) {
        return false;
      }

      if (skillId === "burningCurse" && monster.statusEffects.burn) {
        return false;
      }

      return true;
    }

    function reducePlayerTurnEffects() {
      ensurePlayerCombatState();
      const heavyRecovering = state.player.effects.heavyRecovering;

      if (heavyRecovering) {
        heavyRecovering.turns -= 1;
        if (heavyRecovering.turns <= 0) {
          delete state.player.effects.heavyRecovering;
        }
      }
    }

    function applyMonsterStatusEffects(monster) {
      ensureMonsterCombatState(monster);

      if (!monster?.statusEffects?.burn || monster.hp <= 0) {
        return false;
      }

      const burn = monster.statusEffects.burn;
      const damage = Math.max(1, burn.damage || 1);
      monster.hp = Math.max(0, monster.hp - damage);
      addCombatLog("combatLogs.burnTick", { monsterName: monsterNameParam(monster), damage });
      burn.turns -= 1;

      if (burn.turns <= 0) {
        delete monster.statusEffects.burn;
      }

      return monster.hp <= 0;
    }

    function playerEffectLabels() {
      ensurePlayerCombatState();
      const labels = [];

      if (state.player.effects.guarded) {
        labels.push(t("effects.guarded"));
      }

      if (state.player.effects.heavyRecovering) {
        labels.push(t("effects.heavyRecovering"));
      }

      return labels;

    function monsterEffectLabels(monster) {
      ensureMonsterCombatState(monster);

      if (monster?.statusEffects?.burn) {

      return labels;

    function clearCombatTimers() {
      if (combatAnimationTimer) {
        clearTimeout(combatAnimationTimer);
        combatAnimationTimer = null;
      }

      if (combatResolutionTimer) {
        clearTimeout(combatResolutionTimer);
        combatResolutionTimer = null;
      }

      state.combatAnimation = null;
      state.combatResolution = null;
    }

    function setCombatAnimation(action, duration = MONSTER_ANIMATION_DURATIONS[action] || 400) {
      if (combatAnimationTimer) {
        clearTimeout(combatAnimationTimer);
      }

      const token = `${action}-${Date.now()}-${Math.random()}`;
      state.combatAnimation = { action, token };

      combatAnimationTimer = setTimeout(() => {
        if (state.combatAnimation?.token === token) {
          state.combatAnimation = null;
          combatAnimationTimer = null;
          render();
        }
      }, duration);
    }

    function scheduleCombatResolution(callback, delay) {
      if (combatResolutionTimer) {
        clearTimeout(combatResolutionTimer);
      }

      const token = `resolution-${Date.now()}-${Math.random()}`;
      state.combatResolution = { token };

      combatResolutionTimer = setTimeout(() => {
        if (state.combatResolution?.token !== token) {
          return;
        }

        state.combatResolution = null;
        combatResolutionTimer = null;
        callback();
        render();
      }, delay);
    }

    function createAudioController() {
      const canUseAudio = typeof Audio === "function";
      const failedAssets = new Set();
      const sfxPools = new Map();
      const decks = canUseAudio ? [new Audio(), new Audio()] : [];
      let activeDeckIndex = 0;
      let currentBgmKey = "";
      let unlocked = false;
      let isReportingFailure = false;
      let settings = loadSettings();

      decks.forEach((deck) => {
        deck.loop = true;
        deck.preload = "auto";
        deck.volume = 0;
        deck.dataset.assetKey = "";
        deck.addEventListener("error", () => reportAudioFailure(deck.dataset.assetKey || deck.src || "BGM"));
      });

      document.addEventListener("visibilitychange", applyBgmVolume);

      function sanitizeVolume(value, fallback) {
        const numeric = Number(value);
        return Number.isFinite(numeric) ? clamp(numeric, 0, 1) : fallback;
      }

      function loadSettings() {
        try {
          const saved = JSON.parse(localStorage.getItem(AUDIO_SETTINGS_KEY) || "null");
          if (!saved || typeof saved !== "object") {
            return { ...DEFAULT_AUDIO_SETTINGS };
          }

          return {
            muted: typeof saved.muted === "boolean" ? saved.muted : DEFAULT_AUDIO_SETTINGS.muted,
            musicVolume: sanitizeVolume(saved.musicVolume, DEFAULT_AUDIO_SETTINGS.musicVolume),
            sfxVolume: sanitizeVolume(saved.sfxVolume, DEFAULT_AUDIO_SETTINGS.sfxVolume)
          };
        } catch (error) {
          return { ...DEFAULT_AUDIO_SETTINGS };
        }
      }

      function saveSettings() {
        localStorage.setItem(AUDIO_SETTINGS_KEY, JSON.stringify(settings));
      }

      function bgmVolume() {
        const visibilityMultiplier = document.hidden ? 0.25 : 1;
        return settings.muted ? 0 : settings.musicVolume * visibilityMultiplier;
      }

      function sfxVolume() {
        return settings.muted ? 0 : settings.sfxVolume;
      }

      function desiredBgmKey() {
        if (hasActiveCombat()) {
          return "combat";
        }

        const stageKey = ["village", "forest", "cave", "tomb"][clamp(Math.floor(Number(state.story.stage) || 0), 0, 3)];
        return stageKey || "village";
      }

      function applyBgmVolume() {
        if (!decks.length) {
          return;
        }

        decks[activeDeckIndex].volume = bgmVolume();
      }

      function crossfade(fromDeck, toDeck, duration = 1200) {
        const start = performance.now();
        const fromStart = fromDeck.volume;
        const target = bgmVolume();

        function step(now) {
          const progress = clamp((now - start) / duration, 0, 1);
          toDeck.volume = target * progress;
          fromDeck.volume = fromStart * (1 - progress);

          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            fromDeck.pause();
            fromDeck.currentTime = 0;
            fromDeck.volume = 0;
            toDeck.volume = target;
          }
        }

        requestAnimationFrame(step);
      }

      function reportAudioFailure(asset) {
        const key = String(asset || "audio");
        if (failedAssets.has(key) || isReportingFailure) {
          return;
        }

        failedAssets.add(key);
        isReportingFailure = true;
        addLog("logs.audioFailure");
        render();
        isReportingFailure = false;
      }

      function playElement(element, asset) {
        const playResult = element.play();
        if (playResult && typeof playResult.catch === "function") {
          playResult.catch(() => reportAudioFailure(asset));
        }
      }

      function syncBgm() {
        if (!unlocked || !decks.length) {
          return;
        }

        const key = desiredBgmKey();
        const asset = BGM_ASSETS[key];
        if (!asset || failedAssets.has(asset) || key === currentBgmKey) {
          applyBgmVolume();
          return;
        }

        const nextDeckIndex = activeDeckIndex === 0 ? 1 : 0;
        const fromDeck = decks[activeDeckIndex];
        const toDeck = decks[nextDeckIndex];
        toDeck.src = asset;
        toDeck.dataset.assetKey = asset;
        toDeck.loop = true;
        toDeck.preload = "auto";
        toDeck.currentTime = 0;
        toDeck.volume = 0;
        activeDeckIndex = nextDeckIndex;
        currentBgmKey = key;
        playElement(toDeck, asset);
        crossfade(fromDeck, toDeck, key === "combat" ? 1000 : 1200);
      }

      function unlock() {
        if (unlocked) {
          return;
        }

        unlocked = true;
        syncBgm();
      }

      function playSfx(key) {
        if (!unlocked || !canUseAudio) {
          return;
        }

        const asset = SFX_ASSETS[key];
        if (!asset || failedAssets.has(asset)) {
          return;
        }

        const pool = sfxPools.get(key) || [];
        let voice = pool.find((item) => item.paused || item.ended);
        if (!voice && pool.length < 4) {
          voice = new Audio(asset);
          voice.preload = "auto";
          voice.addEventListener("error", () => reportAudioFailure(asset));
          pool.push(voice);
          sfxPools.set(key, pool);
        }

        if (!voice) {
          voice = pool[0];
        }

        voice.src = asset;
        voice.loop = false;
        voice.volume = sfxVolume();
        voice.currentTime = 0;
        playElement(voice, asset);
      }

      function toggleMute() {
        settings = { ...settings, muted: !settings.muted };
        saveSettings();
        applyBgmVolume();
        render();
      }

      function setMusicVolume(value) {
        settings = { ...settings, musicVolume: clamp(Number(value), 0, 1) };
        saveSettings();
        applyBgmVolume();
        render();
      }

      function setSfxVolume(value) {
        settings = { ...settings, sfxVolume: clamp(Number(value), 0, 1) };
        saveSettings();
        render();
      }

      function getSettings() {
        return { ...settings };
      }

      function getDebugState() {
        return {
          unlocked,
          currentBgmKey,
          failedAssets: [...failedAssets],
          poolSizes: Object.fromEntries([...sfxPools.entries()].map(([key, pool]) => [key, pool.length]))
        };
      }

      return {
        unlock,
        syncBgm,
        playSfx,
        toggleMute,
        setMusicVolume,
        setSfxVolume,
        getSettings,
        getDebugState
      };
    }

    const audioController = createAudioController();

    function setScreen(screen) {
      if (!SCREENS[screen]) {
        return;
      }

      if (screen !== "combat" && isCombatLocked()) {
        state.activeScreen = "combat";
        addCombatLog("combatLogs.combatLocked");
        render();
        return;
      }

      state.activeScreen = screen;
      render();
    }

    function advanceStory(reasonKey, params = {}) {
      state.story.progress += 1;

      if (state.story.stage === 0 && state.story.progress >= 2) {
        state.story.stage = 1;
        state.story.statusKey = "rottenForest";
        state.story.status = "腐爛森林";
        audioController.playSfx("discovery");
        addLog("logs.unlockForest");
        return;
      }

      if (state.story.stage === 1 && state.story.progress >= 5) {
        state.story.stage = 2;
        state.story.statusKey = "dampCave";
        state.story.status = "潮濕洞穴";
        audioController.playSfx("discovery");
        addLog("logs.unlockCave");
        return;
      }

      if (state.story.stage === 2 && state.story.progress >= 9) {
        state.story.stage = 3;
        state.story.statusKey = "oldKingsTomb";
        state.story.status = "舊王墓穴";
        audioController.playSfx("discovery");
        addLog("logs.unlockTomb");
        return;
      }

      if (reasonKey) {
        if (reasonKey.startsWith("special")) {
          audioController.playSfx("discovery");
        }
        if (getTranslationValue(I18N[DEFAULT_LANGUAGE], `logs.${reasonKey}`) === undefined) {
          addLiteralLog(reasonKey);
        } else {
          addLog(`logs.${reasonKey}`, params);
        }
      }
    }

    function gainGold(amount, reasonKey) {
      state.player.gold += amount;
      audioController.playSfx("gold");
      addLog("logs.gainGold", { reason: translatedParam(`logReasons.${reasonKey}`), amount });
    }

    function gainPotion(reasonKey) {
      state.player.potions += 1;
      addLog("logs.gainPotion", { reason: translatedParam(`logReasons.${reasonKey}`) });
    }

    function restAtVillage() {
      const { player } = state;

      if (player.hp >= player.maxHp) {
        addLog("logs.restFullHp");
      } else {
        const missingHp = player.maxHp - player.hp;
        const restoredHp = Math.min(Math.ceil(player.maxHp * 0.35), missingHp);
        player.hp += restoredHp;
        addLog("logs.restRecover", { amount: restoredHp });
      }

      state.activeScreen = "adventure";
    }

    function resolveAdventureEvent(source) {
      if (source === "village") {
        const event = rand(1, 3);

        if (event === 1) {
          gainGold(rand(4, 9), "villageWax");
        } else if (event === 2) {
          gainPotion("abandonedCabinet");
        } else {
          advanceStory("villageOldMan");
          return;
        }

        advanceStory();
        return;
      }

      if (source === "forest" && state.story.stage === 0) {
        addLog("logs.forestForcedCombat");
        startCombat(false, "forest");
        return;
      }

      if (source === "cave" && state.story.stage < 1) {
        addLog("logs.caveBlocked");
        return;
      }

      if (source === "deep" && state.story.stage < 2) {
        addLog("logs.deepBlocked");
        return;
      }

      const roll = rand(1, 100);

      if (roll <= 34) {
        startCombat(false, source);
        return;
      }

      if (roll <= 52) {
        startCombat(true, source);
        return;
      }

      if (roll <= 70) {
        gainGold(rand(6, 14), "oldCoinPurse");
        advanceStory();
        return;
      }

      if (roll <= 84) {
        gainPotion("driedBloodTrail");
        advanceStory();
        return;
      }

      if (state.story.stage >= 2) {
        state.story.keyFragment = true;
        advanceStory("specialKingMark");
        return;
      }

      if (state.story.stage >= 1) {
        state.story.clueFound = true;
        advanceStory("specialCaveCipher");
        return;
      }

      advanceStory("distantBell");
    }

    function handleAdventureChoice(choice) {
      if (choice === "rest") {
        restAtVillage();
      } else {
        resolveAdventureEvent(choice);
      }

      if (state.activeScreen !== "combat") {
        render();
      }
    }

    function generateMonster(strong = false, source = "wild") {
      const playerLevel = state.player.level;
      let attack = 5;
      let defense = 2;

      for (let level = 2; level <= playerLevel; level += 1) {
        attack += rand(1, 4);
        defense += rand(1, 4);
      }

      let maxHp = 14 + playerLevel * 5 + rand(0, playerLevel * 3);

      if (strong) {
        maxHp = Math.ceil(maxHp * 1.35);
        attack += 2;
        defense += 1;
      }

      const monsterId = monsterIds[rand(0, monsterIds.length - 1)];

      return {
        monsterId,
        name: t(`monsters.${monsterId}`),
        maxHp,
        hp: maxHp,
        attack,
        defense,
        ability: monsterId,
        statusEffects: {},
        strong,
        source
      };
    }

    function startCombat(strong = false, source = "wild") {
      if (hasActiveCombat()) {
        state.activeScreen = "combat";
        render();
        return;
      }

      clearCombatTimers();
      clearCombatEffects();
      const monster = generateMonster(strong, source);
      ensureMonsterCombatState(monster);
      state.currentMonster = monster;
      state.combatLogs = [];
      addCombatLog("combatLogs.combatStart", {
        enemyType: translatedParam(monster.strong ? "combatLogs.strongEnemy" : "combatLogs.enemy"),
        monsterName: monsterNameParam(monster)
      });
      state.activeScreen = "combat";
      render();
    }

    function playerAttack() {
      useSkill("basicAttack");
    }

    function useSkill(skillId) {
      const monster = state.currentMonster;

      if (isCombatBusy()) {
        render();
        return;
      }

      if (state.activeScreen !== "combat" || !monster || monster.hp <= 0) {
        addCombatLog("combatLogs.combatEnded");
        render();
        return;
      }

      ensurePlayerCombatState();
      ensureMonsterCombatState(monster);

      if (!isSkillAvailable(skillId, monster)) {
        addCombatLog("combatLogs.skillUnavailable", { skillName: skillName(skillId) });
        render();
        return;
      }

      const skill = skillDefinition(skillId);
      let damage = 0;
      let usesHurtAnimation = false;

      if (skill.id === "heavyStrike") {
        damage = calculateDamage(Math.ceil(state.player.attack * 1.7) + 2, monster.defense);
        monster.hp = Math.max(0, monster.hp - damage);
        state.player.effects.heavyRecovering = { turns: 1 };
        usesHurtAnimation = true;
        audioController.playSfx("playerAttack");
        audioController.playSfx("criticalHit");
        addCombatLog("combatLogs.heavyStrike", { monsterName: monsterNameParam(monster), damage });
      } else if (skill.id === "defend") {
        state.player.effects.guarded = { reduction: 0.55 };
        addCombatLog("combatLogs.defend");
      } else if (skill.id === "burningCurse") {
        damage = calculateDamage(Math.ceil(state.player.attack * 0.45), monster.defense);
        monster.hp = Math.max(0, monster.hp - damage);
        monster.statusEffects.burn = {
          turns: 2,
          damage: Math.max(2, Math.ceil(state.player.attack * 0.45))
        };
        usesHurtAnimation = true;
        audioController.playSfx("playerAttack");
        addCombatLog("combatLogs.burningCurse", { monsterName: monsterNameParam(monster), damage });
      } else {
        damage = calculateDamage(state.player.attack, monster.defense);
        monster.hp = Math.max(0, monster.hp - damage);
        usesHurtAnimation = true;
        audioController.playSfx("playerAttack");
        addCombatLog("combatLogs.playerAttack", { monsterName: monsterNameParam(monster), damage });
      }

      if (monster.hp <= 0) {
        finishVictory();
        render();
        return;
      }

      if (usesHurtAnimation) {
        setCombatAnimation("hurt");
      }

      scheduleCombatResolution(() => {
        const statusDefeatedMonster = applyMonsterStatusEffects(monster);
        if (statusDefeatedMonster) {
          finishVictory();
          return;
        }

        monsterAttack();
      }, usesHurtAnimation ? MONSTER_ANIMATION_DURATIONS.hurt : 160);
      render();
    }

    function monsterAttack() {
      const monster = state.currentMonster;

      if (!monster || monster.hp <= 0) {
        return;
      }

      ensurePlayerCombatState();
      ensureMonsterCombatState(monster);
      setCombatAnimation("attack");
      const baseDamage = calculateDamage(monster.attack, state.player.defense);
      let damage = baseDamage;

      if (state.player.effects.guarded) {
        const guardReduction = Number(state.player.effects.guarded.reduction);
        const reductionFactor = Number.isFinite(guardReduction) ? guardReduction : 0.55;
        const reduction = Math.min(baseDamage - 1, Math.max(0, Math.ceil(baseDamage * reductionFactor)));
        damage = Math.max(1, baseDamage - reduction);
        delete state.player.effects.guarded;
        if (reduction > 0) {
          addCombatLog("combatLogs.guardReduced", { amount: reduction });
        }
      }

      state.player.hp = Math.max(0, state.player.hp - damage);
      audioController.playSfx("monsterAttack");
      audioController.playSfx("playerHit");
      addCombatLog("combatLogs.monsterCounter", { monsterName: monsterNameParam(monster), damage });
      reducePlayerTurnEffects();

      if (state.player.hp <= 0) {
        handleDefeat();
      }
    }

    function finishVictory() {
      const monster = state.currentMonster;

      if (!monster) {
        return;
      }

      const multiplier = monster.strong ? 1.5 : 1;
      const expReward = Math.ceil(rand(2, 10) * multiplier);
      const goldReward = Math.ceil(rand(5, 20) * multiplier);
      state.player.exp += expReward;
      state.player.gold += goldReward;
      audioController.playSfx("victory");
      audioController.playSfx("gold");
      setCombatAnimation("death", MONSTER_ANIMATION_DURATIONS.death);

      addCombatLog("combatLogs.victory", { monsterName: monsterNameParam(monster), exp: expReward, gold: goldReward });
      addLog("logs.victory", { monsterName: monsterNameParam(monster), exp: expReward, gold: goldReward });
      scheduleCombatResolution(() => {
        state.currentMonster = null;
        state.combatAnimation = null;
        clearCombatEffects();
        advanceStory("combatTrace", { stageName: translatedParam(`stages.${currentStage().id}.name`) });
        checkLevelUps();
        state.activeScreen = "adventure";
      }, MONSTER_ANIMATION_DURATIONS.death);
    }

    function handleDefeat() {
      const monster = state.currentMonster;
      const lostGold = Math.min(state.player.gold, rand(3, 10));
      state.player.gold -= lostGold;
      state.player.hp = 1;
      audioController.playSfx("defeat");
      addCombatLog("combatLogs.defeat", {
        monsterName: monster ? monsterNameParam(monster) : translatedParam("combatLogs.unknownEnemy"),
        gold: lostGold
      });
      addLog("logs.defeat", { gold: lostGold });
      scheduleCombatResolution(() => {
        state.currentMonster = null;
        state.combatAnimation = null;
        clearCombatEffects();
        state.activeScreen = "adventure";
      }, MONSTER_ANIMATION_DURATIONS.attack);
    }

    function tryFlee() {
      const monster = state.currentMonster;

      if (isCombatBusy()) {
        render();
        return;
      }

      if (!monster) {
        addCombatLog("combatLogs.noEnemy");
        state.activeScreen = "adventure";
        render();
        return;
      }

      if (rand(1, 100) <= 60) {
        addCombatLog("combatLogs.fleeSuccess", { monsterName: monsterNameParam(monster) });
        addLog("logs.fleeSuccess");
        audioController.playSfx("flee");
        state.currentMonster = null;
        clearCombatEffects();
        state.activeScreen = "adventure";
        render();
        return;
      }

      addCombatLog("combatLogs.fleeFail");
      monsterAttack();
      render();
    }

    function checkLevelUps() {
      const { player } = state;

      while (player.level < MAX_LEVEL && player.exp >= nextLevelExp(player.level)) {
        const neededExp = nextLevelExp(player.level);
        player.exp -= neededExp;
        player.level += 1;

        const attackIncrease = rand(1, 3);
        const defenseIncrease = rand(1, 2);
        const hpIncrease = rand(2, 5);
        player.attack += attackIncrease;
        player.defense += defenseIncrease;
        player.maxHp += hpIncrease;

        const restoredHp = Math.min(player.maxHp - player.hp, Math.ceil(hpIncrease * 0.5) + 4);
        player.hp += restoredHp;
        audioController.playSfx("levelUp");
        addLog("logs.levelUp", {
          level: player.level,
          attack: attackIncrease,
          defense: defenseIncrease,
          hp: hpIncrease,
          restoredHp
        });
      }

      if (player.level >= MAX_LEVEL) {
        player.exp = 0;
      }
    }

    function buyPotion() {
      const { player } = state;

      if (player.gold < POTION_PRICE) {
        addLog("logs.purchaseFailure", { price: POTION_PRICE });
        render();
        return;
      }

      player.gold -= POTION_PRICE;
      player.potions += 1;
      audioController.playSfx("purchase");
      addLog("logs.purchaseSuccess", { price: POTION_PRICE });
      render();
    }

    function usePotion(context = "inventory") {
      const { player } = state;

      if (context === "combat" && isCombatBusy()) {
        render();
        return;
      }

      if (context !== "inventory" && context !== "combat") {
        addLog("logs.invalidPotionContext");
        render();
        return;
      }

      if (context === "combat" && (state.activeScreen !== "combat" || !hasActiveCombat())) {
        addLog("logs.noActiveCombatPotion");
        render();
        return;
      }

      if (context === "inventory" && hasActiveCombat()) {
        state.activeScreen = "combat";
        addCombatLog("combatLogs.inventoryBlockedByCombat");
        render();
        return;
      }

      const log = context === "combat" ? addCombatLog : addLog;
      const potionLogScope = context === "combat" ? "combatLogs" : "logs";

      if (player.potions <= 0) {
        log(`${potionLogScope}.noPotion`);
        render();
        return;
      }

      if (player.hp >= player.maxHp) {
        log(`${potionLogScope}.hpFullNoPotion`);
        render();
        return;
      }

      const healed = Math.min(rand(POTION_HEAL.min, POTION_HEAL.max), player.maxHp - player.hp);
      player.hp += healed;
      player.potions -= 1;
      audioController.playSfx("potion");
      log(`${potionLogScope}.usePotion`, { amount: healed });

      if (context === "combat" && hasActiveCombat()) {
        monsterAttack();
      }

      render();
    }

    function renderStatBar() {
      const { player } = state;

      return `
        <div class="quick-stats" aria-label="${escapeHtml(t("stats.characterStatus"))}">
          <div class="stat"><span>${escapeHtml(t("stats.level"))}</span><strong>${player.level}</strong></div>
          <div class="stat"><span>${escapeHtml(t("stats.hp"))}</span><strong>${player.hp} / ${player.maxHp}</strong></div>
          <div class="stat"><span>${escapeHtml(t("stats.exp"))}</span><strong>${experienceText()}</strong></div>
          <div class="stat"><span>${escapeHtml(t("stats.gold"))}</span><strong>${player.gold}</strong></div>
          <div class="stat"><span>${escapeHtml(t("stats.potions"))}</span><strong>${player.potions}</strong></div>
        </div>
      `;
    }

    function renderSpeakerIcon(muted) {
      if (muted) {
        return `
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
            <path d="M4 9v6h4l5 4V5L8 9H4Z" stroke-width="2" stroke-linejoin="round"/>
            <path d="m18 9-4 6M14 9l4 6" stroke-width="2" stroke-linecap="round"/>
          </svg>
        `;
      }

      return `
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
          <path d="M4 9v6h4l5 4V5L8 9H4Z" stroke-width="2" stroke-linejoin="round"/>
          <path d="M16 8c1.3 1.1 2 2.5 2 4s-.7 2.9-2 4" stroke-width="2" stroke-linecap="round"/>
          <path d="M19 5c2 1.9 3 4.2 3 7s-1 5.1-3 7" stroke-width="2" stroke-linecap="round"/>
        </svg>
      `;
    }

      const settings = audioController.getSettings();

      return `
        <div class="audio-controls" aria-label="${escapeHtml(t("audio.controls"))}">
          <button class="audio-toggle" type="button" onclick="audioController.toggleMute()" aria-pressed="${settings.muted}" aria-label="${escapeHtml(label)}" title="${escapeHtml(label)}">

          </button>

            ${escapeHtml(t("audio.music"))}
            <input type="range" min="0" max="1" step="0.05" value="${settings.musicVolume}" aria-label="${escapeHtml(t("audio.musicVolume"))}" oninput="audioController.setMusicVolume(this.value)">
          </label>
          <label class="audio-slider">
            ${escapeHtml(t("audio.sfx"))}
            <input type="range" min="0" max="1" step="0.05" value="${settings.sfxVolume}" aria-label="${escapeHtml(t("audio.sfxVolume"))}" oninput="audioController.setSfxVolume(this.value)">
          </label>
        </div>
      `;
    }

      const options = Object.keys(LANGUAGES).map((language) => {
        const selected = currentLanguage === language ? " selected" : "";
        const labelKey = language === "zhHant" ? "languageZhHant" : "languageEn";

      }).join("");

          <span>${escapeHtml(t("language"))}</span>

          </select>

          })}
          <p>${escapeHtml(stageDescription)}</p>

            <button type="button" onclick="handleAdventureChoice('village')">${escapeHtml(t("actions.goVillage"))}</button>
            <button type="button" onclick="handleAdventureChoice('challenge')">${escapeHtml(t("actions.challengeMonster"))}</button>
            <button type="button" onclick="handleAdventureChoice('rest')">${escapeHtml(t("actions.rest"))}</button>

          </div>

      `;
    }

    function renderCombat() {
      const { player } = state;
      const monster = state.currentMonster;
      ensurePlayerCombatState();
      ensureMonsterCombatState(monster);
      const combatControlsDisabled = isCombatBusy() || monster?.hp <= 0 || player.hp <= 0 ? " disabled" : "";
      const potionDisabled = combatControlsDisabled || player.potions <= 0 || player.hp >= player.maxHp ? " disabled" : "";

      if (!monster) {
        return `
          <section class="panel">
            <h2>${escapeHtml(t("combat.heading"))}</h2>
            <p class="muted">${escapeHtml(t("combat.noEnemy"))}</p>
            <div class="actions">
              <button type="button" onclick="setScreen('adventure')">${escapeHtml(t("actions.returnAdventure"))}</button>
            </div>
            <h3>${escapeHtml(t("combat.logHeading"))}</h3>
            <div class="combat-log" role="log" aria-live="polite">
              ${state.combatLogs.length ? state.combatLogs.map((entry) => `<p>${escapeHtml(formatLogEntry(entry))}</p>`).join("") : `<p>${escapeHtml(t("common.noCombatRecords"))}</p>`}
            </div>
          </section>
        `;
      }

      return `
        <section class="panel">
          <h2>${escapeHtml(t("combat.heading"))}</h2>
          ${renderSceneStage({
            scene: currentSceneAsset(),
            location: stageText(currentStageIndex(), "name"),
            status: t("combat.status"),
            monster
          })}
          <div class="combat-grid">
            <div class="combatant">
              <h3>${escapeHtml(t("combat.player"))}</h3>
              <p>${escapeHtml(t("combat.hp", { hp: player.hp, maxHp: player.maxHp }))}</p>
              ${meter(player.hp, player.maxHp)}
              <p>${escapeHtml(t("combat.attack", { attack: player.attack }))}</p>
              <p>${escapeHtml(t("combat.defense", { defense: player.defense }))}</p>
              ${playerEffectLabels().length ? `<p class="effect-list">${playerEffectLabels().map(escapeHtml).join("<br>")}</p>` : ""}
            </div>
            <div class="combatant danger">
              <h3${monster.strong ? ` aria-label="${escapeHtml(`${monsterName(monster)} (${t("common.strongEnemy")})`)}"` : ""}>${escapeHtml(monsterName(monster))}</h3>
              <p>${escapeHtml(t("combat.enemyHp", { hp: monster.hp, maxHp: monster.maxHp }))}</p>
              ${meter(monster.hp, monster.maxHp, "enemy")}
              <p>${escapeHtml(t("combat.attack", { attack: monster.attack }))}</p>
              <p>${escapeHtml(t("combat.defense", { defense: monster.defense }))}</p>
              ${monsterEffectLabels(monster).length ? `<p class="effect-list">${monsterEffectLabels(monster).map(escapeHtml).join("<br>")}</p>` : ""}
            </div>
          </div>
          <div class="skill-grid">
            ${availableSkillDefinitions().map((skill) => {
              const description = t(skill.descriptionKey);
              const disabled = isSkillAvailable(skill.id, monster) ? "" : " disabled";
              return `
                <div class="skill-card">
                  <button
                    type="button"
                    onclick="useSkill('${escapeHtml(skill.id)}')"
                    data-focus-key="skill-${escapeHtml(skill.id)}"
                    title="${escapeHtml(description)}"${disabled}
                  >${escapeHtml(t(skill.nameKey))}</button>
                  <p>${escapeHtml(description)}</p>
                </div>
              `;
            }).join("")}
          </div>
          <div class="actions">
            <button type="button" onclick="usePotion('combat')"${potionDisabled}>${escapeHtml(t("actions.usePotion"))}</button>
            <button type="button" onclick="tryFlee()"${combatControlsDisabled}>${escapeHtml(t("actions.flee"))}</button>
          </div>
          <h3>${escapeHtml(t("combat.logHeading"))}</h3>
          <div class="combat-log" role="log" aria-live="polite">
            ${state.combatLogs.length ? state.combatLogs.map((entry) => `<p>${escapeHtml(formatLogEntry(entry))}</p>`).join("") : `<p>${escapeHtml(t("common.noCombatRecords"))}</p>`}
          </div>
        </section>
      `;
    }

    function renderShop() {
      const cannotAfford = state.player.gold < POTION_PRICE;
      const purchaseDisabled = cannotAfford ? " disabled" : "";

      return `
        <section class="panel">
          <h2>${escapeHtml(t("shop.heading"))}</h2>
          ${renderSceneStage({
            scene: SHOP_SCENE_ASSET,
            location: t("shop.location"),
            status: t("shop.status")
          })}
          <p class="muted">${escapeHtml(t("shop.description"))}</p>
          <div class="shop-card">
            <div class="item-icon" data-visual="potion">${renderPotionImage("potion-art")}</div>
            <div>
              <h3>${escapeHtml(t("shop.potionName"))}</h3>
              <p>${escapeHtml(t("shop.price", { price: POTION_PRICE }))}</p>
              <p>${escapeHtml(t("shop.healRange", { min: POTION_HEAL.min, max: POTION_HEAL.max }))}</p>
              <p class="muted">${escapeHtml(t("shop.healCap"))}</p>
              ${cannotAfford ? `<p class="muted">${escapeHtml(t("shop.cannotAffordInline", { price: POTION_PRICE }))}</p>` : ""}
            </div>
            <div class="actions">
              <button type="button" onclick="buyPotion()"${purchaseDisabled}>${escapeHtml(t("actions.buy"))}</button>
            </div>
          </div>
        </section>
      `;
    }

    function renderProfile() {
      const { player } = state;

      return `
        <section class="panel">
          <h2>${escapeHtml(t(SCREENS.profile))}</h2>
          ${renderSceneStage({
            scene: currentSceneAsset(),
            location: stageText(currentStageIndex(), "name"),
            status: currentStoryStatus(),
            compact: true
          })}
          <div class="info-grid">
            <div><strong>${escapeHtml(t("profile.labels.level"))}</strong><br>${player.level} / ${player.maxLevel}</div>
            <div><strong>${escapeHtml(t("profile.labels.exp"))}</strong><br>${player.exp}</div>
            <div><strong>${escapeHtml(t("profile.labels.nextExp"))}</strong><br>${player.level >= MAX_LEVEL ? escapeHtml(t("profile.maxLevel")) : nextLevelExp()}</div>
            <div><strong>${escapeHtml(t("profile.labels.hp"))}</strong><br>${player.hp} / ${player.maxHp}</div>
            <div><strong>${escapeHtml(t("profile.labels.attack"))}</strong><br>${player.attack}</div>
            <div><strong>${escapeHtml(t("profile.labels.defense"))}</strong><br>${player.defense}</div>
            <div><strong>${escapeHtml(t("profile.labels.gold"))}</strong><br>${player.gold}</div>
            <div><strong>${escapeHtml(t("profile.labels.potions"))}</strong><br>${player.potions}</div>
            <div><strong>${escapeHtml(t("profile.labels.status"))}</strong><br>${escapeHtml(currentStoryStatus())}</div>
          </div>
        </section>
      `;
    }

    function renderInventory() {
      const { player: p } = state;
      const disabled = p.potions <= 0 || p.hp >= p.maxHp ? " disabled" : "";

      return `
        <section class="panel">
          <h2>${escapeHtml(t("inventory.heading"))}</h2>
          <div class="shop-card">
            <div class="item-icon" data-visual="potion">${renderPotionImage("potion-art")}</div>
            <div>
              <h3>${escapeHtml(t("inventory.potionCount", { count: p.potions }))}</h3>
              <p>${escapeHtml(t("inventory.healRange", { min: POTION_HEAL.min, max: POTION_HEAL.max }))}</p>
              <p class="muted">${escapeHtml(t("inventory.currentHp", { hp: p.hp, maxHp: p.maxHp }))}</p>
            </div>
            <div class="actions">
              <button type="button" onclick="usePotion('inventory')"${disabled}>${escapeHtml(t("actions.usePotion"))}</button>
            </div>
          </div>
        </section>
      `;
    }

    function renderActiveScreen() {
      if (state.activeScreen === "adventure") {
        return renderAdventure();
      }

      if (state.activeScreen === "combat") {
        return renderCombat();
      }

      if (state.activeScreen === "shop") {
        return renderShop();
      }

      if (state.activeScreen === "profile") {
        return renderProfile();
      }

      if (state.activeScreen === "inventory") {
        return renderInventory();
      }

      return renderMain();
    }

    function render() {
      const activeControl = app.contains(document.activeElement) && ["BUTTON", "INPUT", "SELECT"].includes(document.activeElement.tagName)
        ? document.activeElement
        : null;
      const focusKey = activeControl ? controlFocusKey(activeControl) : "";
      document.title = `${t("gameTitle")} | RPG`;

      app.innerHTML = `
        <header class="topbar">
          <div class="brand">
            <div class="brand-row">
              <svg class="black-candle-sigil" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                <path d="M32 6 45 18 58 20 50 32 53 48 38 45 32 58 26 45 11 48 14 32 6 20 19 18Z" fill="#070605" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
                <path d="M32 14c4 5 3 8 0 11-3-3-4-6 0-11Z" fill="#d6a84f"/>
                <path d="M25 26h14v18H25z" fill="#0e0b09" stroke="#6f8760" stroke-width="2"/>
                <path d="M23 46h18M28 30h8M32 26v20" stroke="#7e91a0" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <h1>${escapeHtml(t("gameTitle"))}</h1>
            </div>
            <p>${escapeHtml(t("gameSubtitle"))}</p>
          </div>
          <div class="topbar-tools">
            ${renderLanguageControls()}
            ${renderAudioControls()}
            ${renderStatBar()}
          </div>
        </header>
        ${renderNav()}
        <main class="layout">
          ${renderActiveScreen()}
          ${renderLogs()}
        </main>
      `;

      if (focusKey) {
        const focusTarget = Array.from(app.querySelectorAll("button, input, select"))
          .find((control) => controlFocusKey(control) === focusKey);

        if (focusTarget && !focusTarget.disabled) {
          focusTarget.focus();
        } else {
          const screenHeading = app.querySelector(".panel h2");

          if (screenHeading) {
            screenHeading.tabIndex = -1;
            screenHeading.focus();
          }
        }
      }

      updateGameAnnouncer();
      audioController.syncBgm();
    }

    app.addEventListener("click", (event) => {
      if (event.target.closest("button, input, select")) {
        audioController.unlock();
      }
    });

    app.addEventListener("keydown", (event) => {
      if ((event.key === "Enter" || event.key === " ") && event.target.closest("button, input, select")) {
        audioController.unlock();
      }
    });

    render();
  </script>
</body>
</html>
